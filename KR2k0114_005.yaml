body:
  text: 中呉紀聞巻五宋龔明之撰唯室先生唯室先生姓陳氏諱長方字齊之其先本長樂人父侁字復之擢進士第娶林氏大卿旦之女大雲翁宓之妹與陳了翁交從甚宻了翁讁亷州侁以書賀之至千餘言由此得罪又嘗從游定夫學深得治氣養心行已接物之道故其子亦為道學之士唯室因外家居于歩里終日閉户研窮經史著書名步里客談又有漢唐論俱行於世其弟少方字同之亦端慧不群號二陳姑蘇百題詩楊備郎中天聖中為長溪令夢中忽作詩曰月俸蚨錢數甚㣲不知從宦幾時歸東呉一片烟波在欲問何人買釣磯及窹心潛異之明道初宰華亭俄丁内艱遂家于吴中樂其風俗之羙安而弗遷因悟夢中所作幾於前定嘗效白體作我愛姑蘇好十章居吴中既久土風人物皆深詳之又作姑蘇百題詩每題箋釋其事至今行於世范祕書范雩字伯達予之同舍也嘗試禹稷顔囘同道論先生見之以為竒作置之魁選遂馳譽於太學學者至今以為模範入館除祕書郎今叅政公即其子也張子韶與周煥卿簡崐山周煥卿與張子韶侍郎為布衣交相與之意極厚煥卿有母䘮貧不能舉及有妹未嫁子韶自貶所専价賫錢銀供其費書詞懇惻讀之令人竦然生敬前輩恤朋友之難毎毎如此范忠宣之於石曼卿蘇文忠之於李方叔皆同此一念也今録其書于後以警薄俗云九成頓首日俟車馬之來乃杳然無耗不勝瞻仰即辰孝履多福九成此間學生例不受其束脯有信州劉益秀才在此多時告以公未葬母及未嫁妹許以二百千足助公今付去半則銀三鋌錢二十五千足掩子内角子有九成親批字紹祖三字及兩頭有如此二字及封印今遣去親隨兩人便令歸也發此物去時巳焚香對諸聖碩公無障難幸見悉也他節哀自重不宣九成再拜蝦子和尚承平時有蝦子和尚好食活蝦乞丐于市得錢即買蝦貯之袖中且行且食或隨其所徃宻視之遇水則出哇群蝦皆㳺躍而去後不知所終郭家朱砂圓郭氏本郡中一小民所謂林酒仙者毎至其家必解衣以醉之酒仙遷化前數日語郭氏曰疇昔荷相接之勤以藥一杯為報郭氏以味惡頗難之力强之飲至三呷而止酒仙自舉而盡遂授以朱砂圓方曰惜乎富及三世爾郭氏竟售此藥四方爭求買之自此家大富三世之後絶無有欲之者陳了翁鱸鄉亭詩陳文惠公留題松陵詩其末有秋風斜日鱸魚鄉之句屯田郎林肇為吴江日作亭江上因以鱸鄉名之了翁初主吴江簿嘗為賦詩云中郎亭榭據江鄉雅稱詩翁賦卒章蓴菜鱸魚好時節秋風斜日舊烟光一杯有味功名小萬事無心嵗月長安得便抛塵網去釣舟閑傍畫欄旁了翁筮仕之初已無戀官職之意矣起隠子季父諱况字濬之登崇寜五年進士第再遷入館在館八年學術文章俱不在人下時同列知名者惟季父與蘇元老在庭爾當時號為龔蘇葉石林俊聲藉甚嘗為文字交其他所與酬唱者如洪玉父朱新仲王豐父張敏叔亦皆一時名士用先都官中隱故事自號起隱子有文集三十巻曰起隱集終祠部員外郎朝議大夫季父詩格清古如詠劉伶云逃名以酒轉名高醉裏張髯罵二豪日月巳為吾户牖何妨東海作醇醪九日云家家高㑹錦糢糊誰信貧家菊也無多謝東鄰送醅至旋於籬畔覓茱茰自古誰無九日詩詩成須道菊花枝直饒無菊何妨醉野蓼村葵總是題遊天峰寺云杖藜高踏半山雲不見此山知幾春異時人物凋零盡只有青山似故人午歇惠安寺云寒食都來數日閒顏卿家帖到今傳此公剛鯁無情煞到得春時也自憐送唐大監云東門相别又相逢轉覺衰頽一老翁子約重来我方去滿庭黄葉正秋風古樂府云妖嬈破瓜女爭上秋千架香飄石榴裙影落薔薇下牆外見鴛鴦雙雙春水塘歸来情脉脉無緒理殘粧其他如貪山借船賞嗜酒典琴沽閑多巻滿新題句懶極床堆未答書客踈閑吠犬庖匱割啼雞得句怕難續避人長轉多山色秋難老池光夜不昏此類甚多閭丘大夫閭􅉌孝終字公顯東坡謫黄州時公為太守與之徃来甚宻未幾掛其冠而歸與諸名人為九老之㑹東坡過蘇必見之今蘇集有詩詞各二篇皆為公作也公後房有懿卿者頗具才色詩詞俱及之東坡嘗云蘇州有二丘不到虎丘即到閭丘寳嚴院常熟海虞山有古刹號寳嚴院吴越錢王之子祝髪於此太宗嘗賜御書急就章逍遥詠及聖惠方於寺中有浮屠七級極壯麗吴人相傳自京師来泗州僧伽塔為第一此為第二至今尚在洞庭山太湖之中有包山一名洞庭韋蘇州皮陸唱和所言洞庭及蘇子美詩云笠澤鱸肥人膾玉洞庭柑熟客分金皆在吴江也今岳州之南所謂洞庭者即酈善長注水經云洞庭之陂乃湘水非江水也周内相洪道嘗折衷二說云洞庭山在吴而洞庭湖乃在荆襄之間地形雖分而地脉未嘗斷也周公之說又本於東坡方子通紅梅詩方子通紅梅詩膾炙人口其云清香皓質世稱竒漫作輕紅也自宜紫府與丹來換骨春風吹酒上凝脂直教臘雪無藏處只恐朝雲有散時溪上野桃何足種秦人應獨未相知范無外范周字無外文正公之妷孫贊善大夫純古之子少負不羈之才工於詩詞不求聞達士林甚推之所居號范家園安貧樂道未嘗屈折於人石監簿存中有園亭在盤門内嘗徃謁之不遇題於壁間云范周来謁石存中未必存中似石崇可惜南山焦尾虎低頭拜狗作烏龍方賊起郡中令總甲廵䕶雖士流亦不免無外率府庠諸生冠帶夜行首用大燈籠書一絶于其上云自古輕儒孰若秦山河社稷付他人而今重士如周室忍使書生作夜廵郡將聞之亟為罷去盛季文作守時頗嫚士嘗於元宵作寳鼎現詞投之極䝉嘉奬因遺酒五百壺其詞播於天下毎遇燈夕諸郡皆歌之嘗櫂舟訪郏子高於崐山一日酒酣題於絶頂云萬疊青巒壓巨崐四垂空濶水天分夜光寒帶三江月春色隂連萬里雲桂子鶴驚空半落天香僧出定中聞不將此景慿張孟三百年来屬老文綽堆避御名改曰堆即今綽墩崐山縣西數里有村曰綽堆故老傳云此乃黄幡綽之墓至今村人皆善滑稽及能作三反語陸彦猷陸徽之字彦猷常熟人高才博學衆推為鄉先生出其門者如陳起宗徽猷張柟朝議錢觀復郎中皆為時顯人徽宗即位下詔求直言公因廷對與雍孝聞輩皆力陳時政闕失唱名日有㫖駁放孝聞立殿下叩頭曰陛下求直言有云言之者無罪今詔墨猶未乾奈何以直言罪人衛士怒孝聞唐突以拄斧撞其頰數齒俱落凡直言者盡捽出之大觀末彗星見旋見收復時雍公巳不能語止賜六字道號居神霄宫彦猷欲赴京師巳卒其孫端成字天錫就特奏恩時上書及廷試直言者俱得罪京師有謔詞云當初親下求言詔引得都来胡道人人招是駱賔王并洛陽年少自訟監宫并岳廟都一時閑了誤人多是誤人多誤了人多少翠微集崐山翠微有主僧沖邈年八十有八生平好為詩所著號翠微集姚舜明侍郎嘗贈之詩云僧臘俗年俱老大儒書佛教舊精勤姑蘇一萬披緇客四事無如彼上人邑宰葢嶼亦有讀翠微集詩云聖宋吟哦只九僧詩成徃徃比陽春翠微閣上今朝見格老辭清又一人生老病死崇寧中有㫖州縣置居飬院以存老者安濟坊以養病者漏澤園以葬死者吴江邑小而地狹即縣學之東隙地以次而為之時以諸生在學而数者相為比隣謂之生老病死郟子高郟僑字子高比部公之子負才挺特與范無外為忘形交鄉人至今推之謂之郟長官晚歳自號凝和子崐山上方有層屋曰翠微子高多㳺厯山中嘗賦詩云行客倦奔馳尋師到翠微相看無俗語一笑任天機曲沼淡寒玉横山鎖落暉情根枯未得愛此幾忘歸訪凌峰賢上人云步入凌峰閣尋師師未歸凭欄寂無語唯見白雲飛簡公約有素琴堂又為賦詩云素琴之堂虚且清素琴之韻淪杳𠖇神閑意定黙自鳴宫商不動誰與聼堂中道人骨不俗貌龎形端顏瑩玉我嘗見之醒心目寧必絲桐絃斷續嗚呼靖節巳死不復聞成虧相半疑昭文阮手鍾耳相吐吞素琴之道詎可論道人道人聼我語紛紛世俗誰師古金徽玉軫方步武虚堂榜名無自苦鄭應求予年二十時三舍法行與鄭君聘應求同在郡庠應求精於人鑑同舍皆為其品題心甚畏之嘗見唐煇子明以手拊其腰曰異日金琅璫無疑矣子明性莊重靣大發赤一日顏仲謙過鄰齋應求指以示余曰此公蛇行居官必尚猛乗間又語予曰吾友乃一壽星頗類應逢原但得其半耳然亦可銀琅璫衆皆未以為信後二十年仲謙守嚴陵頗有郅都之風後三十年子明躋法從後七十年予始拜牙緋之寵其言無一不驗應求亦甚有文聲獄山太湖中有東獄西獄二山呉王於此嘗置男女二獄楊備郎中詩云雷霆號令雪霜威二獄東西鎻翠微髣髴鄷都叢棘地巖扉應是古圜扉王學正王彦光察院之伯祖諱僖字康國居太學有聲鄉人謂之王學正識與不識皆尊敬之有堂名逸野以累試不利日㳺適其中以讀書自娱其持身治家甚嚴鄉中率取以為法彦光自幼知讀書乃學正公之訓也生平無子葉大年挽之云書劍當年㳺上都賢闗蟲篆校諸儒文華燦燦九苞鳳俊氣駸駸千里駒妙質競誰揮堊漫白頭空此死樵蘇遺編殘槀應猶在搔首令人益歎吁又云遺文膾炙在吾鄉賦罷誰能少薦揚聲跡有妻先蝶夢行藏無子付絣方雲蘿烟蔓新泉石秋月春花舊野堂交倡綵牋真翰墨幾人知為寳巾箱逸野堂至今尚存王氏舉族祀之不絶范文正為閻羅王曽王父捐館至五七日曽王妣前一夕忽夢其還家急令開篋笥取新衣裳而去因問之曰何怱促如此答曰来日當見范文正公衣冠不可不早正也又問范公何為尚在𠖇間曰公本天人也見司生死之權既覺因思釋氏書謂人死五七則見閻羅王豈非文正公聰明正直故為此官邪吴縣宼主簿詩石林居吴下一日至閶門外小寺中壁間有題一絶云黄葉西陂水漫流籧篨風急一扁舟夕陽暝色来千里人語雞聲共一丘石林極愛之但不書其名氏因問寺僧云吴縣宼主簿所作今官滿去矣宼名寳臣徐州人善作詩少從后山先生學其源流有所自来矣盤溝大聖承天寺普賢院有盤溝大聖身長尺許人有禱祈置之掌上吉則拜凶則否人皆異之推所從来乃盤溝村中有漁者嘗遇一僧云何不更業漁者云他莫能之僧云吾教汝塑泗州像可以致富漁者云人不欲之則奈何僧云吾授汝一法遂以千錢與之令像中各置一錢所售之直亦以千錢為率漁者如所教競求買之果獲千緡今寺所藏乃其一也豈非僧伽託此以度人耶魏令則侍郎魏憲字令則與其弟志俱有聲太學號熈豐人才徽廟朝為東䑓御史入侍經幄論思獻納為多又代言西掖得温厚雅正之體遷吏部侍郎久之除顯謨閣學士知明州建炎初召赴行在季父禮部送之以詩云炎祚無疆越萬齡如何戎馬尚慿陵中興事業須王導撥亂韜鈐要孔明劇盗已分齊鉞定端星行指泰階平呼韓朝渭非難事好繼當時丙魏聲圖經刋誤舊圖經云外堽青堽五家岡蒲岡塗松岡徘徊岡福山岡竝在吴縣界今次第而數之其上之四屬崐山下之三屬常熟言其地之逺近與吴縣大相遼絶續圖經云太和宫在盤門之外其地唐相畢瑊之别業也竊詳畢瑊未嘗為相為相者乃畢諴也瑊與諴兄弟爾草腰帶聼聲元豐中姑蘇有一瞽者號草腰帶善揣骨聼聲一日王父呼其至家以祖姑吉凶禍福扣之云此婦人他日必以夫而貴但出適時事干朝廷時祖姑巳許嫁顧沂大夫以其語不祥舉室皆唾之論命未竟適有㨗夫過門報省榜者王父亟出問榜首姓名云無為人焦蹈既入告之嗟惋不已王父怪之因問曰知此人聲骨否曰熟知之王父曰官職如何曰不能食禄安問官職也衆皆以為焦已為大魁術者之言必謬經旬有自京師来者云揭榜後六日焦巳死矣祖姑在曽王父服中顧以欲之官促其期遂引女年二十不待父母服除法聞之朝得㫖方成禮其言無一不驗壓雲軒詩崐山翠微之上有亭曰壓雲軒邑士胡清嘗賦詩云誰建危亭壓翠微畫簷直與暮雲齊有時一片巖隈起帶與老僧山下歸軒旁有小柏數株又賦詩云栽傍巖隈未足看為言斤斧莫無端他時直入掄材手不獨青青保嵗寒後有一文人作浙漕因到山中見之大喜尋訪其人厚禮以待之既憐其貧遂給官田胡由此致富翟忠惠翟汝文字公巽其先本南徐人後徙居常熟紹興初為叅知政事卒門人謚為忠惠先生公文章甚古所作制誥皆用尚書體天下至今稱之自宣政以来文人有聲者唯公與葉石林汪浮溪孫蘭陵四人耳孫嘗自評云某之視浮溪浮溪之視石林各少十年書石林視忠惠亦然識者以為確論公素儉雖身歴兩府奉養甚於貧士一日招客未飲時與客論近世風俗侈靡燕樂之間尤甚因正色言曰德大於天子者然後可以食牛德大於諸侯者然後可以食羊客自度今日之集必無盛饌已而果以惡草具進公在翰苑時禁中新創儺儀有㫖令撰文是日辰巳間中使送篇目至午後亟督索進呈數篇既立就而文法且極高古石林乃謂公文極艱得在西掖時以草詞遲罰銅又在試院議䇿題以冗官為問一夜僅成四句云太平日久人樂仕進可為朝廷慶者一可為有司慮者二石林頗怪之予竊謂公之文正不當以遲速論當視其得意與否耳䇿題雖止四句實佳作也白雲泉天平山有白雲泉雖大旱不竭或云此龍湫也唐刺史白樂天有詩云天平山上白雲泉雲自無心水自閑何必奔衝下山去更添波浪在人間蘇子羙嘗至山中為賦長篇范貫之亦有和章諝三命諝三命者承天寺僧精隂陽山水之術吉凶無不立驗好食活雞巳就死者則却而不食人欲其卜𦵏必以數十活雞自隨聞其聲咿然則食之愈喜率以是為常後享高夀而死其茶毗也有五色舍利自舌本湧出吾家虎丘墳乃其所擇也𦵏之明年有偃松生其上范文正詞范文正與歐陽文忠公席上分題作剔銀燈皆寓勸世之意文正云昨夜因看蜀志笑曹操孫權劉備用盡機闗徒勞心力只得三分天地屈指細尋思爭如共劉伶一醉人世都無百嵗少癡騃老成尫悴只有中間些子年少忍把浮名牽繫一品與千金問白髪如何囬避臞菴吴江王份文孺自號臞菴嘗築圃於松江之側方經始時文孺下榻待余延留數月見買葑作址計三百萬錢圃成極東南之勝後湖蘇養直嘗賦詩云王郎臞菴摩詰詩烟花遶舍江遶籬石渠東觀了無夢筆床茶竈行相期古人巳徃不可作甫里顧有今天隨灣頭蟹舍豈著我請具蓑笠懸牛衣又為文孺賦草堂云笛弄松江明月蓑披笠澤歸雲若話青霄快活五侯何處如君蠡口蠡口在齊門之北乂有蠡塘在婁門之東故老相傳云范蠡破吴辭越乗扁舟遊五湖潛過於此遣人馳書招文種大夫因以名之楊備郎中詩云霸越勲名間世才五湖烟浪一帆開猶防烏喙傷同輩此地復招文種来蛇化為劔干將墓在今匠門城東數里頃有人畊其旁忽見青蛇上其足其人遽以刀勦之上之半躍入草中不復可尋徐觀其餘乃折劔也至暮欲持歸亦不復見方子通有詩具載其事衛月山因筆録云匠門外干將墓土人取作竈無蟑蜋竈雞賈表之賈公望字表之丞相昌期之孫青之子頃倅平江時朱勔父子方出入禁中竊弄權柄一時奔競之流爭持苞苴唯恐無門而入賈獨疾之甚嘗有詩云倐忽向六十萍蓬無奈何丹心猶奮迅白首分蹉跎正直士流少傾邪朋類多陽光一銷鑠不復見妖魔其志尚亦足嘉矣勔之子為浙西路分司有賜帯之寵賈亦同時衣金紫服旦日適相㑹於天慶朱之虞因見賈所佩魚熟視之賈厲聲叱之曰此是才力得来非縁花石之故左右皆錯愕朱甚銜之為其所擠賈竟停任易承天為能仁寺宣和中戶部幹當公事李寛奏凡以聖為名者竝行禁止又給事中趙野奏凡世俗以君王聖三字為名字悉合革而正之然尚有以天為稱者竊慮亦當禁約其後又有以龍皇主玉字不當言者亦請遏絶前後共禁八字遂易承天為能仁其他觀寺及士庶名字犯而不改則重加之罪雖橋梁有為龍形者亦皆鑿去之太學同舍陳朝老語余曰此無君無天之兆甚可畏也季父倅興仁日一太守曲意奉行盡取諸寺觀藏經命剪去所禁八字未幾太守卒章户部章縡字伯成莊敏公之子莊敏教諸子甚嚴恐其縱肆閉置一書室中故縡與綡皆中第而亦甚有文季父禮部取縡之姪女召為校書郎日縡以詩餞之有船尾淮山青未了馬頭隋桞緑相迎之句孫仲益甚喜之晚年詩律益高清淳雅徤得唐人之風有文集三十巻藏于家終户部郎中王教授祭學生文慶歴中郡學既建養士至百員亦有自他郡至者建陽二江忘其名肄業未久其季忽感疾而殂時王逢㑹之為教官率同舍祭之云維慶歴七年嵗次丁亥七月甲戌朔初六日已卯蘇州州學教授王逢率在學同人謹以香酒果實致奠化𠖇紙告祭于學生建陽江君之靈人固動物爾氣完則在氣散則死生與死吾不得而知也惟是生者有名教存焉得以異諸物善而夭為不死惡而夀為不幸子年尚少徒步數千里旅吴學以道義為身謀於善無所負今夭去吾得謂子不死矣夫旅而死無親戚左右為之助者有之今子兄在焉啓而手足比無助者為多同門生幾百員為子哭不為孤其亦善德之召歟子魂氣何所之吾與子有生死之别旅櫬舉而望涕不知其所從哀哉尚饗沈元叙滄浪亭詩蘇子羙獨步游滄浪亭詩云花枝低欹草色齊不可騎入步是宜有時載酒只獨徃醉倒唯有春風知紹興初崐山沈東元叙嘗㳺其亭賦詩云草蔓花枝與世新登臨空復想清塵只今唯有亭前水曽識春風載酒人程致道與張敏叔游滄浪亭詩有云醉倒春風載酒人蒼髯猶想見長身試尋遺址名空在却笑張羅事巳陳皆寓其感歎之意中呉紀聞巻五
