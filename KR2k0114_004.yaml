body:
  text: 中吴紀聞巻四宋龔明之撰太公避地處常熟海隅山有石室十所昔太公避紂居之孟子謂太公避紂居東海之濱者此也常熟去東海止六十七里故謂之海濱楊備郎中嘗作詩紀其事范忠宣公范純仁字堯夫為人寛厚長者文正嘗使至鄉還至京口見石曼卿數䘮未舉盡以麥舟與之蘇黄門稱其為佛地位中人觀此亦可以見矣元祐初自慶帥召為給事中遂執政柄未幾拜右僕射凛然有父風烈為宰相一年出知潁昌府既而復入相坐元祐黨散官安置元符三年徽宗即位復欲召為相尋即下世遺表有云葢嘗先天下而憂期不負聖人之學此先臣所以教子而㣲臣所以事君後御筆題其墓碑云世濟忠直之碑子正平字子夷正思字子黙學行亦為士林所稱滕章敏公結客滕章敏公慷慨豪邁不拘小節少嗜酒浮湛里市與鄭獬毅夫為忘形友議論風采照映一世嘗與毅夫及楊繪元素同試京師自謂必魁天下與二公約若其言不騐當厚致其罰已而鄭居榜首楊次之公在第三二公責所約之金答曰一人解一人㑹吾安得不居第三俱一笑而散公平生不妄交遊嘗作結客詩云結客結英豪休同兒女曹黄金裝箭鏃猛獸畫旗旄北闕芒星落中原王氣高終令賀蘭賊不著赭黄袍其立志可見矣思賢堂郡齋後舊有思賢堂以祠韋白劉三太守後更名三賢紹興末洪内相景嚴為郡益以唐王常侍仲舒本朝范文正之像復號為思賢堂今叅政范公作記郡庠亦有三賢堂繪文正范公并安定胡先生及光禄朱公像於其中顧學正顧襄字公甫為太學上舍生名聲藉甚士流皆推之登熙寜元年第調潤州丹徒尉召還為太學正元豐五年卒於京師時二親猶在鄭逹夫太宰與公甫為同舍生以詩挽之云可惜病相如公病渇而卒誰尋封禪書雙親千里外一葉九秋餘風露翻歸旐塵埃鎖故廬虎丘山下路㑹葬有鄉車廣文官舍冷如氷幾歎朝衫脫未能忽買春田埋玉地猶懸綘帳讀書燈佳名空綴仙都石妙偈争𫝊海寺僧一幅粉旌春水漫惜君誰不涕奔騰鄭希尹鄭景平字希尹居帶城橋為人剛正不詭隨蒞官有亷聲嘗為大理每有疑獄中夜焚香露拜蘄得其情以故人無寃死者既而請老家居朝廷以其精力有餘落職致仕守鄱陽到官未半嵗拂袖而歸先君與公厚善因問其故答曰天子命景平為郡守當以撫字為職乃不得行其志今日須金幾百兩明日須銀幾千兩枯骨頭上打不出也景平後世要人身其志竟不可奪也時朱勔用事勢可炙手士大夫俛節從之者甚多惟公終始無阿附意子絪字天和執㸑詩程光禄自幼穎悟年五六嵗時戲劇竈下家奴嫚之曰汝能狹劣爾豈解為文章耶公怒曰吾豈不能家奴曰試為我吟一燒火詩即應聲曰吹火櫻脣歛投柴玊腕斜囬看煙裏面恰似霧中花甫冠登第王元之畫像虎丘御書閣下有王黄州畫像東坡過蘇日見之自謂想其遺風餘烈願為執鞭而不可得因為之作賛今猶書其上雙蓮堂䨇蓮堂在朩蘭堂東舊芙蓉堂是也至和初光禄吕大卿濟叔以䨇蓮花開故易此名楊備郎中有詩云雙蓮倒影面波光翠葢風摇紅粉香中有畫船鳴鼔吹瞥然驚起兩鴛鴦政和中盛宻學季文作守亦産雙蓮范無外賦朩蘭花詞云羙蘭堂晝永晏清暑晚迎凉控水檻風簾千花競擁一朶偏雙銀塘盡傾醉眼訝湘娥倦倚兩霓裳依約凝情鑑裏竝頭宫面高粧蓮房露臉盈盈無語處恨何長有翡翠憐紅鴛鴦妒影俱斷柔腸凄凉芰荷暮雨褪嬌紅換𬗋結秋房堪把丹青對寫鳳池歸去携將孫若虚滑稽孫實字若虚早年英聲藉甚性好滑稽郡庠有同舍生牛其姓者因作牛秀才賦嘲之云腰帶頭垂尚有田單之火幞頭脚上猶聞寗戚之歌又作書語集句譏一老生云孜孜為善雞鳴起先王之道斯為羙四十五十無聞焉斯亦不足畏也巳時樂圃先生為教授知之命其父訓敕孫由此發憤㳺太學不數嵗登第而歸嘗入朝為寺丞後守台州卒慧感夫人慧感夫人舊謂之聖姑或以為大士化身靈異甚著祝安上通守是邦事之尤謹每有水旱惟安上禱祈立騐後以剡薦就除台守既至錢唐詰旦欲渡江夢一白衣婦人告之曰来日有風濤之險既覺頗異之卒不渡至午颶風倐起果覆舟數十獨安上得免一夕盗入祠中竊取其旛平旦廟史入視之見一人以旛纒其身環走殿中因執以問答曰某實盗也夜半幸脫巳踰城至家矣今不知潜制於此神之威靈使然敢不伏辜建炎間金兵將至城下有一居民平昔謹於奉事夢中告之曰城將陷矣速為之所謹勿以此告人佛氏所謂劫數之說不可逃也不數日兵果至其它神驗不一後加封慧感顯祐善利夫人今叅政范公為作記元少保元綘字厚之居第在帶城橋登天聖五年進士甲科初任金陵幕官尋即進用屢為藩郡帥時有𫝊儂智高餘黨冦二廣者遂以公知廣州而所𫝊乃妄因改知越州公謝上表云忽聞羽檄之音謂有龍編之警横水明光之甲得自虚聲雲中赤白之囊倡為危事横水明光之甲乃唐時誤𫝊㓂至事見李德裕獻替記人服其工公在金陵時王荆公之父益為通守與公厚甚荆公既相神宗一日欲謹選翰林學士公乆在外老於從官荆公對曰有真翰林學士但恐陛下不能用爾况巳作龍圖閣學士難下遷知制誥遂自外遷翰林學士中外大驚既就列有稱職之譽公最長於四六多取古今𫝊記佳語為之神宗友愛嘉岐二王不許出閣二王固辭後因改封先召公謂之曰可於麻詞中勿令更辭公遂草制其略云列第環宫彌聳開元之盛側門通禁共承長樂之顔神宗甚愛之自是二王不復辭未幾叅大政元豐中罷政知潁州時以藩邸升為順昌軍節度公作謝表云燾土立社是開王者之風乗龍御天厥應聖人之作按圖雖舊錫命惟新又曰興言駿命之慶基宜升中軍之望府謂文武之德順而聖唐虞之道明而昌合為嘉名以侈舊服士大夫皆傳誦之後以太子少保致仕歸吴中公既還鄉與程光禄諸公為九老㑹日以詩酒自娛年七十餘卒有玉堂集三十巻初公知荆南嘗夢至仙府與三人連書名旁有告之曰君三人葢兄弟也覺而思之不知所謂既入翰林為學士韓持國維楊元素繪在院一日因書奏列名三人偏傍皆從糸始悟夢中兄弟之意既而持國元素皆補外公亦尹京兆後三年復與元素還職而鄧文約綰相繼為直院則三人之名又皆從糸葢始終皆同以此知升沉進退決非偶然者許大夫選嘗作四翰林詩紀其事公和云聨名適似三珠樹𫝊玩驚看五朶雲此亦一時之異也仲殊仲殊字師利承天寺僧也初為士人嘗與鄉薦其妻以藥毒之遂棄家為僧工於長短句東坡先生與之徃来甚厚時時食蜜觧其藥人號曰蜜殊有寳月集行於世慧聚寺詩僧孚草堂以其喜作艷詞嘗以詩箴之云大道乆陵遲正風還陊隳無人整頽綱目亂空傷悲卓有出世士蔚為人天師文章通造化動與王公知囊括十洲香名翼四海馳肆意放山水灑脫無覊縻雲輕三事衲缾錫天下之詩曲相間作百紙頃刻為藻思洪泉瀉翰墨清且竒惜哉大手筆胡為幽柔詞願師持此才奮起革澆漓騖彼東山崗圖祖進豐碑再續輔教編高步凌丹墀他日僧史上萬世為蓍龜迦葉聞琴舞終被習氣隨伊予浮薄人贈言増忸怩倘能循我言佛日重光離老孚之言雖苦口殊竟莫之改一日造郡中接坐之間見庭下有一婦人投牒立於雨中守命殊詠之口就一詞云濃潤侵衣暗香飄砌雨中花色添憔悴鳳鞋溼透立多時不言不語厭厭地眉上新愁手中文字因何不倩鱗鴻寄想伊只訴薄情人官中誰管閑公事後殊自經於枇杷樹下輕薄子更之曰枇杷樹下立多時不言不語厭厭地如村胡嶧字仲達五桞之子文與行皆能繼其父與方子通為忘年交後以年格推調安逺尉非其志也乃取老杜諸孫貧無事宅舍如荒村之句自號如村老人治圃築室遺外聲利自放於閑適而終不出仕有文集二十巻號如村冗藁唯室先生及叅政周公葵皆為作序子伯能登進士第鄭毅夫吴江橋詩鄭豸字毅夫嘗作吴江橋詩寄劉孜叔懋云三百䦨干鎻畫橋行人波上踏靈鼇挿天螮蝀玉腰濶跨海鯨鯢金背高路直鑿開元氣白影寒壓破大江豪此中自與銀河接不必仙槎八月濤劉時為呉江尉亦有和篇皆刻之石鄭詩題云寄同年叔懋祕校劉於詩前具位加榜下二字於其上乃原父之弟也張幾道挽詩張僅字幾道居萬夀寺橋與顧棠叔思皆為王荆公門下士荆公修三經義二公與焉幾道登第未幾捐館方子通作挽詩云吴郡聲名顧與張龍門當日共升堂青衫始見登華省丹旐俄聞入故鄉含淚孤兒生面垢斷腸慈母滿頭霜嗟君十載人間事不及南柯一夢長至今誦其詩者為之出涕吴人目子通為方挽詞幾道官至著作郎范文正不取燒煉方范文正少養於朱氏朱南京人文正幼年肄業京學同舍有病者親為調藥以病亟屬文正曰吾無以報子平生有一術遊逺方未嘗窮乏者用此術也今以遺子因授藥一囊方書一小册文正不得巳留之未嘗取視後二十餘年得其子還之封記如故夜航船夜航船唯浙西有之然其名舊矣古樂府有夜航船之曲皮日休答陸龜䝉詩云明朝有物充君信㰂酒三瓶寄夜航俗語吴人呼来為釐始於陸德明詒我来牟棄甲復来皆音釐葢德明吴人也又吴人言罷則以休繼之始於吴王昔吴王語孫武曰將軍罷休亦吴語也方子通詩誤入荆公集方子通一日謁荆公未見作詩云春江𣺌𣺌抱牆流烟草茸茸一片愁吹盡桞花人不見春旗催日下城頭荆公親書方冊間因誤載臨川集後人不知此詩乃子通作也盧發運公諱秉擢皇祐元年進士第元豐中為發運使其父太中公退老公毎嵗上計得請歸鄉後帥涇原懇辭歸養特賜手詔慰勉時以為榮大雲翁林宓字德祖旦之子擢進士第為常州教授在職六年學者益信服大觀二年大比試決科者四十餘人於是賜詔曰閱前日賔興之數較其試中多寡惟常州為最苟依常格推恩非古人進賢受上賞之意特改宣德郎郡守因以進賢揭坊名於學之南郡人榮之後除河北路提舉學事任滿除開封府左司録居數月浩然有歸志優詔如所請公既勇退屏置朝服足不踐州縣舊隐在大雲坊因自號大雲翁卒年六十六葬博士塢平生好古嗜學有大雲集一百巻神宗皇帝聖訓録一十巻花客詩張敏叔嘗以牡丹為貴客梅為清客菊為夀客瑞香為佳客丁香為素客蘭為幽客蓮為浄客酴醿為雅客桂為仙客薔薇為野客茉莉為逺客芍藥為近客各賦一詩吴中至今𫝊播中吴平江本吴國在秦屬㑹稽郡東漢分㑹稽置吳郡陳為呉州隋為蘇州大業末復為呉郡唐武德中復為蘇州乾寜中錢氏據錢塘蘇湖之南悉其奄有後唐為中吴軍節度皇朝興國中置平江軍節度又復謂之蘇州嘗為徽宗潜藩遂陞為府祖姑教子登科予之祖姑適知泉州德化縣李處道祖姑甚有文讀書通大義賦詩書字皆過人其子援登進士第乃祖姑所親教也晚而事佛誦蓮經皆千過嘗問法於圓照禪師師名之曰守安年幾七十而卒既得疾即屛藥餌書佛頂呪焚灰九之并以然燈法授援曰我死置灰丸懷中然燈如法也因起坐誦大士名號乆之而化既小殮視其手指屈結皆成印相佛徒歎服以為不可及張文潜學士為墓誌首記其事范祕丞范世京字延祖龍圖公之子登皇祐五年進士第調應天府柘城簿和州歴陽令時龍圖公出守四明公亟走膝下曰人子者事親之日少而事君之日多豈忍曠年失定省邪既而龍圖公捐館扶䘮歸里垢靣跣足晝夜哀號不絶行道之人莫不嗟惻服除知秀州海鹽縣勸民孝友睦婣及耕桑之事治聲動浙右熙寜初朝廷銳意改作召公管勾湖北廣恵倉至京論事不合乃辭歸舊治海旁之民聞公復来驩呼鼓抃巳而有疾乞以本官歸田里乃下詔授祕書丞致仕享年四十一公居鄉與樂圃先生甚厚有文集若干巻藏于家徐朝議徐師閔字聖徒仕至朝議大夫退老于家日治園亭以文酒自娱樂時太子少保元公絳正議大夫程公師孟朝議大夫閭丘公孝終亦以安車歸老因相與繼㑹昌洛中故事作九老㑹章岵為郡守大置酒合樂㑹諸老於廣化寺又有朝請大夫王珫承議郎通判蘇湜與焉公賦詩為倡諸公皆屬而和之以為吴門盛事元公少保和篇云五日佳辰郡政閑延賔談笑豁幽關閶門歌舞尊罍上林屋烟霞指顧間德應華星臨潁尾年均皓髪下商顔名花羙酒踈鐘永坐見斜暉隠半山方子通亦有和篇云使君瀟灑上賔閑金地無人晝敞闗風静簫聲来世外日長仙境在人間詩成郢客争揮翰曲罷吴姬一破顔此際東南無此㑹高名千古映湖山章守以五日開宴故二詩皆及之顔夫子顔長民登元豐二年進士第三子采為孚亦相繼擢高科采字君用終提舉常平為字仲謙終嚴陵守孚字端中崇觀間有聲於太學士行甚羙毎試必居前列皆目之為顔夫子人欲識其靣而不可得既登第滕樞宻康許嫁以女尋即下世信義縣崑山在蕭梁時分婁置縣號信義屬信義郡大同初分信義置崑山縣華亭舊亦為蘇之屬邑或云嘗割崑山之境以縣華亭今華亭亦有崑山時人嘗以片玉比機雲兄弟而以此為北崑山縣舊有城古圖經云在縣東三百步今謂之東城者是也近嵗耕者於薦嚴寺田中得城磚甚多及箭鏃以銅為之識者疑其為春秋時物今縣之西二十里許有村曰信義如婁縣之存舊名也俗遂訛為鎮義汴人龔猗仕至殿中侍御史居於是村之南因挿銀杏枝活時人異之目為遇仙云李無悔李無悔名行中本霅川人徙居淞江高尚不仕獨以詩酒自娱晚治園亭號醉眠東坡先生與之㳺從嘗以詩贈之無悔有書顔魯公碑詩云平生肝膽衛長城至死圖回色不驚世俗不知忠義大百年空有好書名又賦佳人嗅梅圖云蠶眉鴉鬢縷金衣折得梅花第幾枝嗅盡餘香不回面思量何事立多時其詩意尚深逺大率類此蟹吴之出蟹舊矣吴越春秋云稲蟹無遺種又陸魯望集有蟹志云漁者緯蕭承其流而障之曰蟹斷又曰稻之登也率執一穗以朝其魁然後縱其所之今吴人謂之輸芒大本錢王後身圓照在靈巖時有一藍縷道人自號同水客徑造其室中守門者莫能遏既而圓照屏侍者與語有竊聼之者聞圓照末後一語云汝今幾甲子矣答曰八萬四千恒河沙數甲子圓照云八萬四千恒河沙數甲子以前又作麽生道人拂袖而出云錢大錢大又待瞞人也當時疑圓照為吴越後身道人為洞賔郟正夫失鶴詩正夫在童丱時作失鶴詩云久鎻沖天鶴金籠忽自開無心戀池沼有意出塵埃鼓翼離幽砌凌雲上紫臺應陪鸞鳯侣僊島任徘徊其志巳不凡矣黄姑織女崐山縣東三十六里地名黄姑古老相傳云嘗有織女牽牛星降于此地織女以金箆劃河河水湧溢牽牛因不得渡今廟之西有水名百沸河鄉人異之為之立祠按荆楚嵗時記黄姑者河鼓也牽牛謂之河鼓後人訛其聲為黄姑潘子直云亦猶桑落之語轉呼為索郎耳鄉人因以名其地見於題詠甚衆古樂府云東飛伯勞西飛燕黄姑織女時相見李太白詩云黄姑與織女相去不盈尺李後主詩云迢迢牽牛星杳在河之陽粲粲黄姑女耿耿遙相望劉筠内翰詩云伯勞東翥燕西飛又報黄姑織女期其他不能盡載雖非指此黄姑然得名之由亦可類推也祠中舊列二像建炎兵火時士大夫多避地東岡有范姓者經從祠下題於壁間云商飈初至月埋輪烏鵲橋邉綽約身聞道佳期唯一夕因何朝暮對斯人鄉人遂去牽牛像今獨織女存焉禱祈之間靈跡甚著每遇七夕人皆合錢為青苖㑹所収之多寡持环珓問之無毫釐不驗一方甚敬之舊有廟記今不復存矣孫積中孫載字積中其曽祖漢英仕錢氏嘗為蘇州崑山鎮防遏使故為崑山人公㓜岐嶷如成人既學為師友所推譽治平二年進士及第為河中府户曹更三守皆立威嚴者公獨與之争曲直矯矯不少下終以此見知或稱薦之中書檢正官察訪闗中辟公為官屬公務佽助之亦不苟與之合乾祐縣去永興最逺青苗法行乾祐獨不以予民察訪怒移其令檄公徃案之公還言邑小民貧其徒嵗以禾麥博易為生且立法之初民未知稱貸於公家為利令無罪宜復其任公用薦者遷官知湖州德清縣公聼斷精明不專任刑罰開說其是非出於至誠訟有累年不決者聞公一言感悟相捨而去熙寜八年吴越饑獨縣中熟公勸大家乗時倍糴得米十餘萬斛明年春米價騰踊公平其直使糶賴以全活者不可數計其他便民者别有數十事德清人至今德公又用薦者遷官知考城縣官制行換奉議郎其治考城如德清於方田也以最聞縣四鄰皆重法地素饒盗公明賞格嚴保伍姦無所囊槖一日都監與尉来告盗集境上將以上元掠近郭至期公張燈與其僚樂飲許民嬉游不禁夜如故事盜叵測遂遁去迄公受代亦無復䑕竊者府界提㸃薦公于朝他使者亦相繼上公治狀神宗出名氏付中書葢欲用公矣未幾除廣東路常平召見便殿以遣之二廣使者春夏例簡出公至則犯隆暑徧行所部宣布德意哲宗即位轉承議郎諸路常平官廢公赴吏部授通判陜州移廣東轉運判官於是公去嶺南五年矣吏有嘗不快於公者頗欲棄官公聞而慰留之乃舉焉紹聖初復諸路常平官除公河北西路改知海州巳而除沂州興學養士走書幣招禮宿儒為學者師表治務大體遷朝奉大夫知婺州移河東路轉運判官又移淮西路提㸃刑獄徽宗即位遷朝請大夫知亳州言者謂公嘗附薦元祐黨人得提舉杭州洞霄宫即歸崐山日與親戚閭里置酒棊奕道故舊為樂任且滿本路使者等言孫某先朝所選擢名在循吏年雖高精力幸未衰願使再任以示優老之意詔從之大觀中遷朝議大夫未幾公亦自上章乞守本官致仕公體素無疾先一月至其先人墳壠徧謁嘗所徃来者若將别然既亟呼妻子與訣屬以後事問日早晏盥手焚香即寢而逝享年七十有五葬高景山公天資樂易於吏治尤所長使四路典三大郡咸著循跡每遇物無忮害所至汲引其屬士大夫受薦者至四百餘人多知名且貴顯於世者自少喜讀易慕唐人為詩著易釋解五巻文集五十巻藏于家王主簿王仲甫字明之岐公之猶子風流翰墨名著一時後客于吴門嘗有所愛徃京師為岐公強留之逾時不返因作詩云黄金零落大刀頭玉筯歸期劃到秋紅錦寄魚風逆浪碧簫吹鳳月當樓伯勞知我經春别香蠟窺人一夜愁好去渡江千里夢滿天梅雨是蘇州此詩效古樂府藁砧今何在體人皆愛其巧其殁也丁永州注葆光祭之有云爽秀英㧞出於天資談經咏史博識周知文華自得不務競時古格近體率意一揮金玉鏘揚組繡陸離世俗所得特其歌辭又云生習華貴不見艱巇徘徊鴟閣出入鳳池乗興南㳺曠逹不覊朝賞夕宴選勝搜竒擺脫冠裳郤去輪蹄不驚榮辱不罣是非擾擾萬緒付于一巵頺然終日去智忘機王之為人於此可見矣著作王先生著作王先生程門高弟諱蘋字信伯世居福之福清父仲舉徙平江政和元年卒𦵏呉縣横山桃花塢誌其墓者江公望書其誌者陳瓘也先生為人清純簡易達於從政有憂時愛君之心有開物成務之學高宗駐蹕平江守臣孫佑薦於朝賜對前後所上疏劄類切于時宜聖諭以通儒目之賜進士出身除秘書省正字兼史館校勘遷著作佐郎受勅正朱墨史官至左朝奉郎與門人陳長方楊邦弼講道于震澤如楊龜山尹和靖胡文定皆深推讓呉中道學之傳莫盛于先生紹興二十三年卒于家𦵏湖州長興縣和平鎮茅栗山門人章憲撰誌呉中閩中皆祠于學其子大本兩浙安撫司參議先生平生所註論語集解古今語說著作文集并高宗所賜勅及遺像震澤記善録至今藏于家子孫世守府城德慶坊故居云中呉紀聞巻四
