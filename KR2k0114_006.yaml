body:
  text: 中呉紀聞巻六宋龔明之撰西樓詩紹興中郡守王㬇顯道建西樓賦詩者甚衆獨耿時舉德基為擅場其詩曰西樓一曲舊笙歌千古當樓面翠峨花發花殘香徑雨月生月落洞庭波地雄鼓角秋聲壯天逈欄干夕照多四百年来無妙手要看風物似元和德基他文稱是居太學久之不得一第而死惜哉郭仲達郭章字仲達世居崐山自幼工於文游京師太學有聲因歸鄉省親作詩别同舍云半菽年来屬未涯羞騎欵段出京華漲塵囬旋風頭𦂳綺照支離日脚斜掠過短莎驚脫踏翻紅葉閙歸鴉不堪囘首孤雲外望斷淮山始是家俄又賦一篇云也知隨俗調歸䇿却憶當年重出關豈是長居户限上可能無意馬蹄間中原百甓知誰運今日分隂敢自閑倘有寸功禆社稷歸来恰好試衣斑其詩傳播一時後以守城恩拜官被知已薦居帥幕久之官至通直郎卒於京師年四十餘無子淩佛子淩哲字明甫與余同肄業郡庠誠實君子也紹興中為正言上䟽論秦氏親黨因縁得科第有妨寒素進取之路公論甚與之累遷至吏部侍郎後以敷文閣待制通議大夫致仕年八十餘而卒公處己以㢘待人以恕雖身至從班不啻如寒士非時未嘗輙至郡中終年無一毫干請書室之前有一茶肆日為群小聚㑹之地公與賔客談話甚苦其喧遣介使之少戢巳而復然公不與較因徙以避之其長厚𩔖如此人目之為淩佛子崐山學記程詠之宰崐山其政中和有古循吏風嘗修治縣庠張無垢為作記欲鐫之石或謂無垢託此以諷朝士尋即巳之今横浦集亦不載因附見于此右通直郎知平江府崐山縣事程公詠之文簡公之曽孫伊川先生之姪也紹興二十八年七月十二日作書抵余曰沂聞為政莫先於教化教化莫先於興學吾邑有學卑陋不治甚不稱朝廷所以尊儒重道之意學門有社壇齋㕔掩蔽于前氣象不舒沂乃移于社壇之西闢其門墻廣袤數十丈又以東隅建學外門周植槐桞増崇殿門營治齋宇氣象宏偉殿堂齋廡鼎鼎一新遇月旦則率縣官詣學請主學者分講六經與諸生環坐堂上以聼焉時知府事待制蔣公名其堂曰致道并書學榜以寵賁之於乎可謂盛矣又曰先生昔學于大儒其所見聞非俗儒比願以其所聞者明以告我我將有以大之余曰吾老矣久抱末疾舊學荒落顧何以副子之請雖然不可以虚辱也輙以聞於師者以告左右左右其擇焉竊嘗以為學者當以孔子為師以孔子為師當學孔子之學非為博物洽聞絺章繢句高自標置視四海為無人攘臂而言曰吾仕宦當至將相吾富貴當歸故鄉吾當記三箧於渡河賦萬言於倚馬此正俗儒之學孔子之學乃不如是熟誦孔子若聖與仁則吾豈敢之說子夏掬澑播灑之說孟子徐行後長者之說以求孔子之心可也是謂孔子之學若乃學如馬融如陸淳博如許敬宗文如班固如桞子厚亦可矣而依梁冀而助武氏而事竇憲而附王叔文此吾儕之所羞道而孔門之罪人也詠之以為如何如其不然當明以教我王唐公王綯字唐公秦正懿王審琦五世孫建炎中為御史中丞金犯維揚車駕南渡公扈從以行東宫初建以資政殿學士權太子少傅未幾拜叅知政事力丐奉祠御書霖雨思賢佐一聯以賜之紹興七年薨于崐山僧舍年六十四諡和子陔公為人剛正有守立朝無所阿附宣和乙已䇿士於廷公為詳定官多取議論剴切者置甲科建炎已酉金兵深入公具陳攻守之䇿宰相不以為然巳而金犯維揚終無策公自建康扈從至臨安道由鎮江從容奏陳陳東以忠諫被誅此其鄉里也即命賙其家官其子車駕幸㑹稽時韓世忠邀擊金兵歸騎於揚子江公議遣兵追襲俾與世忠夾擊之同政者議不合遂求去公雖為執政其家貧甚毎以禄不及親自奉極儉薄仕宦二十年無寸椽可居自奉祠後寓崐山惠嚴僧舍蕭然一室服食噐用無異於寒士天性仁孝賙恤婣族無所不至俸入之餘買田贍給其孤貧者又為之畢婚冠䘮𦵏平居無他嗜好唯讀書為樂其文温潤典雅深於理致於死生禍福之說尤所洞達其寢疾也家人召醫且欲灼艾公曰時至即行留連無益薨前二日書戊戌字示左右屬纊之日果戊戌也其前知如此公所著述有内外制四十巻奏議三十巻進讀事實五巻論語解三十巻孝經解五巻群史編八十巻内典略録百巻顧景繁顧禧字景繁居光福山中其祖沂字歸聖終龔州太守其父彦成字子羙嘗將漕兩浙景繁雖受世賞不樂為仕閉戶讀書自娯自號漫莊又號癡絶嘗注杜工部詩其他著述甚富所與交者皆一時名士鄱陽張紫微彦實擴以詩聞天下景繁結為一社與之唱酬今張集有送顧景繁暫歸浙西詩云牆頭飛花如雪委牆根老栁絲垂地春正濃時君不留山路曉風鳴馬箠濤江入眼浪千尺想見吴儂問行李田園久荒漫撿挍親舊相逢半悲喜行朝諸公訪人材故人新賜尚書履袖中有䇿則可陳君亦因行聊爾耳又他詩稱譽景繁不一如云顧侯風味更嚴苦家貧闕辦三韭菹龜腸撑突五千巻底用㑹萃箋蟲魚又云虎頭文字逼前輩衮衮顓䝉分尺素天閑老驥日千里何用鹽車追蹇步景繁隠居五十年享高夀而終子羙除漕到蘇臺過南峰山拜先都官墓都官子羙之外祖也廵尉䕶送至山中親題于享亭之壁予視景繁為中表慈受禪師慈受禪師深老靖康間住靈巖學徒甚尊之平生所作勸戒偈頌甚多皆有文法鏤板行於世嘗自為真賛云自顧箇形骸舉止凡而陋只因放得下觸事皆成就醍醐與毒藥萬味同一口羙惡盡銷融是故名慈受孫仲益作守時因上元命之陞座慈受舉似云靈巖上元節且與諸方别只㸃一椀燈大千俱照徹也不用添油光明長皎潔雨又打不濕風又吹不滅大衆畢竟是甚麽燈教我如何說時高峰瓚老相去不逺絶不㑹面因中秋賞月書一絶寄瓚老云靈岫高峰咫尺間青松長伴白雲閑今宵共賞中秋月莫道山家不徃還師名懷深蔣侍郎不肯立坊名胡文恭守蘇蔣公希魯將致政歸文恭公頃為諸生嘗受學於蔣因即其居第表為難老坊蔣公見之愀然謂文恭曰此俚俗歆豔内不足而假之人以誇者非所望於故人也願即徹去文恭公愧謝欲如其請則營繕巳嚴乃資其嘗獲芝草之瑞改為靈芝文恭退而語人曰識必因德而後達蔣公之德葢人所畏而其識如是固無足疑其如非吾所及也孫郎中孫緯字彦文擢進士第仕至尚書郎為人誠朴好以俗下語為詩文而多近理秦師垣生於臘月二十五日嘗獻壽詩云面臉丹如朱頂鶴髭髯長似緑毛龜欲知相府生辰日此是人間祭竈時師垣甚喜之公精於本朝典故及巨室大家名系世次無不通曉嘗著本朝人物志行於世潘恱之潘兊字恱之操履甚正鄉人皆尊敬之徽宗朝為中書舍人遷禮部侍郎與先君子甚厚常徃来於滄浪之上飲酒賦詩延欵竟日恱之無子妷民瞻工於詩與季父唱和成集南北章章氏本建安郇公之裔後徙于平江者有二族子厚丞相家州南質夫樞密家州北兩第屹然輪奐相望為一州之甲呉人號南北章以别之余良弼占卦影余仔字良弼三舍法行與余皆肄業郡庠又以同經聚于一齋良弼試上舍義題自假樂君子顯顯令德至干禄百福子孫千億良弼反覆用天人之說遂中高選既貢京師道由南徐訪一日者揲蓍得卦影畫文書一軸書天人二字於其上下書兩甲兩癸又畫二雁一入雲中一為箭所中日者云此文書二十年後可復用良弼以為不然既試南宫果不第退舍而歸累試皆蹉跌後罷舍法以免舉赴省義題與預貢時不少異即欲盡冩舊作同舍曉之云文格與今不同矣用之必不騐良弼深以卦影之言為信竟書之不易一字鄉人用新格者俱見黜獨良弼得之廷試後一第下世時去揲蓍時適滿二十年之數王彦光王葆字彦光擢宣和甲辰第崐山自郟正夫登第後有孫積中後六十載無有繼之者彦光擢第時呉昉博士適為邑宰有致語云振六十載之頽風賈三千人之餘勇紀其實也紹興改元天子廣言路講求賢良等材彦光時主麗水簿慨然上疏陳十弊皆切中時病其末以儲嗣為請語尤切直至謂仁宗時中外無事海宇晏然而范鎮等為國逺計其所納忠急急在此况當今日國步多艱人心易動强虜未靖羣盗陸梁天下之勢危若綴旒而甲觀之崇未聞流慶中外惴恐此為甚急臣願陛下為宗社無疆之計廣求宗室之中仁明孝友時論所歸者歴試諸事以係人心執政讀而竒之彦光素為秦益公噐重和議既定梓宫及太后皆還彦光時主宗正寺簿上書於益公僅三百字大意謂自古宰相功業之盛無如伊尹周公究其終始之言伊尹過周公逺矣方其相成湯輔太甲其功無與比當是時遂思復政於君而啓其告歸之意今咸有一德之書是也周公則不然夾輔成王坐致太平之功此時可以告老矣而卒不之魯故其後有四國流言之禍今欲為伊尹乎欲為周公乎惟閣下所擇益公得書頗喜久之除司封郎彦光既丁内艱服闋再居舊職一日益公語彦光曰檜待告老如何曰此事不當問之於某益公曰他人不敢言以公有直氣故問之嘗記紹興八年某為右相時公以書勸某去位保全功名今何故不言彦光曰果欲告老不問親與讐擇其可任國家之事者使居相位誠天下生民之福益公黙然俄除監察御史兼崇政殿說書益公薨出知廣德移漢州又移瀘州終浙東提刑彦光居鄉教誘後進終日論文不倦其所成就甚衆所學最長於春秋有春秋集傳十五巻春秋備論兩巻弟萬姪嘉彦登第叅政范公嘗作挽詩云喻蜀三年戍還吴萬里船雲歸䨇節後雪白短檠前百世春秋傳一丘陽羡田浮生如此了何必更淩煙日者悲離索公乎又杳㝠門人辨韓集子舍得韋經此去念築室空来聞過庭路遥人不見千古泣松銘彦光鍳裁甚精李樂菴為布衣時流落兵火之餘一見以為佳士妻以女弟今叅政周公初第時愛其博洽即納之為壻二公尋即榮遇而又學術氣節聳動當世人於是服其知人至於從其學者亦能第其甲科之先後無不一如所期至今言其事者莫不稱歎以為不可及狀元䜟穹窿山在城之西里老相傳云穹窿石移狀元來歸一夕聞有風雨聲詰旦視之果有石自東而移西者淳熙辛丑黄子由遂魁多士崑山雖去松江不逺舊無潮汐紹興中方有之猶不及二十里外李樂菴嘗見一道人云潮到夷亭出狀元後以此語葉令子强因作問潮館識其語今巳過夷亭矣但未知騐於何時然潮汐起於崐山邑人必有當此䜟者四幡之助大父自甲子既周之後遇生朝則捨一大幡於寳積寺刹柱嵗率以為常時曽王妣之越上留其壻顧沂大夫家大父徃省之夜宿於蕭山渡繫舟於一古桞之下終夕為之安寢拂曉舟師大驚四顧皆巨浸舟齊於朩之杪須臾水退獨免漂溺是夕王妣夢艤舟之地有四黄幡覆其上方有疑於心王父既歸言其事因屈指計之已歴四生朝矣吴仁傑云龔浩字子正徃蕭山訪顧沂舟值水發比到家其妻云向夢有黄幡六首罩一舟龔問其日正水發之夕也葢嘗以生朝施二幡於承天寺不染塵觀音殿凡三嵗矣適如夢中之數按吴氏感應録所記微有不同當以此說為是然不染塵觀音殿乃是在城報恩寺今北寺也樂菴樂菴在崐山之東南六七里李公彦平游息之所也公本江都人紹興初避地居此嘗為溧水宰以德化民四年無犯死罪者剡章交上召對陳便民十事除知温州未行擢監察御史出知婺州召拜司封郎官遷樞宻院檢詳時上屢引見僧徒談性空之理一日因對論及禪宗公奏曰昔周公亦坐禪上愕然公徐曰周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦非坐禪而何陛下誠能端坐而思所以愛人利物之道即坐禪也何必他求乎俄以引年掛其冠而歸遂即菴廬而居之自號樂菴安叟居年餘上愛公精力不衰詔起致仕除侍御史同知壬辰貢舉因革去險怪之習文體為之一變而所得多一時名士因上疏論后戚不當居樞筦之地遷起居郎不就知台州又不就復上請老之章時王仲行為右正言亦力彈之莫子齊為給事中不書黄周洪道直學士院不草制皆遭遷逐布衣莊治嘗作四賢詩公道學精通且樂於教學者嘗誦康節語以告人曰學為人之仁學為人之事所以教人者率不外此公中年以後絶欲清修唯一蒼頭給事年幾八十視聼言論雖少年有所不及菴之左右皆植修竹經史圖書滿室忽旬餘不食屏醫却藥終日燕坐一夕親作手簡徧别親舊仍命其子不得齋僧供佛書訖倐然而逝所著文章甚多號樂菴集又有易說語孟說若干巻呉江詞建炎庚戍兩浙被兵禍有題水調歌頭於呉江者不知其姓氏意極悲壯今録之于後平生太湖上短棹幾經過如今重到何事愁與水雲多擬把匣中長劔換取扁舟一葉歸去老漁蓑銀艾非吾事丘壑已蹉跎膾新鱸斟羙酒起悲歌太平生長豈謂今日識兵戈欲㵼三江雪浪淨洗邉塵千里不用挽天河囬首望霄漢雙淚墮清波徐望聖徐師囬字望聖師閔之弟嘗為南康太守作直節堂蘇黄門為之記以為物之生未有不直者一為物所撓雖松柏竹箭之堅不能自保惟杉能遂其直求之人葢不待文王而興者黄門未嘗以言假人其推重公如此子閎中孫林兢曽孫藏羊充實羊充實舊與予肄業郡學其為人好崖異且狠愎一夕同舍對牀劇談充實偶以言侵衆遂相率聯句戯之云彼羙羊充實彎彎角向天口内餐荷葉尻中放瑞蓮細毛堪作筆麄毳可為氊子貢雖曽愛齊宣不見憐其他不能盡記充實見諸公更相應答機鋒甚銳遂哀鳴不巳自是處衆和易待人亦有禮諺所謂菱角雞頭之說信矣蘇民三百年不識兵姑蘇自劉白韋為太守時風物雄麗為東南之冠乾符間雖大盗蠭起而武肅錢王以破黄巢誅董昌盡有浙東西五代分裂諸藩據數州自王獨錢氏常順事中國本朝既受命盡籍土地府庫帥其屬朝京師遂去其國葢自長慶以来更七代三百年吴人老死不見兵革承平時泰伯廟棟猶有唐昭宗時寧海鎮東軍節度使錢鏐姓名書其上可謂盛矣大觀中樞宻章公之子綖為蔡京誣以盜鑄詔開封尹李孝夀即呉中置獄連逮千餘人遣甲士五百圍其家鉦鼔之聲晝夜不絶俗謂之聒囚鼓州民目所未覩莫不為之震駭獄既不就又遣三御史蕭服沈畸姚忘其名重按其至也人皆自門隙中窺之不敢正視識者已知非太平氣象故其後有建炎之禍方章氏事未覺時城中小兒所在群聚皆唱云沈逍遙莫知其由巳而三御史果至之彝老之彝老外岡楊氏子名則之字彞老嘗學詩於西湖順老學禪於大覺璉禪師詩號禪外集禪學有十𤣥談叅同契俱行於世嘗作早梅詩云數蕚初含雪孤清畫本難有香終是别雖瘦亦勝寒横笛和愁聼斜枝倚病看朔風如觧意容易莫吹殘又雪霽觀梅詩云荒園晚景歛寒烟數朶清新破雪邊幽艷有誰能畫得冷香無主賴詩傳看来最畏前村笛折去難逢野渡船向晚十分終更好静兼江月淡娟娟紀異盛章季文作守時譙樓一夕為火所焚有得其煨燼之餘者欲析而為薪見其中有大吉二字遂聞之於朝又郡學有一立石中夜光起教官言於州因作瑞石放光頌亦奏之又大成殿一夕為雷擊其柱火光異常東壁額上遺四帶青布巾大可貯五斗粟教官命以香案置之中庭詰朝視之無有矣朱氏盛衰朱沖微時以常賣為業後其家稍温易為藥肆生理日益進以行不檢兩受徒刑既擁多貲遂交結權要然亦能以濟人為心每遇春夏之交即出錢米藥物募醫官數人廵門問貧者之疾從而賙之又多買弊衣擇市嫗之善縫紉者成衲衣數百當大寒雪盡以給凍者諸延夀堂病僧日為供飲食藥餌病愈則已其子勔因賂中貴人以花石得幸時時進奉不絶謂之花綱凡林園亭館以至墳墓間所有一花一朩之竒怪者悉用黄紙封識不問其家徑取之有在仕途者稍稍拂其意則以違上命文致其罪浙人畏之如虎花綱經從之地廵尉䕶送遇橋梁則徹以過舟雖以數千緡為之者亦毁之不恤初江淮發運司於真揚楚泗有轉般倉綱運兵各據地分不相交越勔既進花石遂撥新裝運船充御前綱以載之而以餘舊者載糧運直逹京師而轉般倉遂廢糧運由此不繼禁衛至於乏食朝廷亦不之問也勔之寵日盛父子俱建節鉞即居第創雙節堂又得徽廟御容置之一殿中監司郡守必就此朝朔望勔嘗預曲宴徽宗親握其臂與語勔遂以黄羅纒之與人揖此臂竟不舉弟妷數人皆結姻於帝族因縁得至顯官者甚衆盤門内有園極廣植牡丹數千本花時以繒綵為幙帟覆其上每花標其名以金為標榜如是者數里園夫畦子蓻精種植及能疊石為山者朝釋負擔暮紆金紫如是者不可以數計圃之中又有水閣作九曲路入之春時縱婦女遊賞有迷其路者朱設酒食招邀或遺以簪珥之屬人皆惡其醜行一日勔敗檢估其家貲有黄發勾者素與勔不協既被㫖黎明造其室家人婦女盡驅之出雖閭巷小民之家無敢容納不數日巳墟其圃所謂牡丹者皆析以為薪毎一扁牓以三錢計其直勔死又竄其家於海島前日之受誥身者盡褫之當時有謔詞云做園子得數載栽培得那花朩就中堪愛特將一个保義酬勞反做了今日災害詔書下来索金帶這官誥看看毁壊放牙笏便擔屎擔郤依舊種菜又云疊假山得保義幞頭上帶著百般村氣做模様偏得人憎又識甚條制今日伏惟安置官誥又来索起不如更疊箇盆山賣八文十二初勔之進花石也聚於京師艮嶽之上以移根自逺為風日所殘植之未久即槁瘁時時欲一易之故花綱旁午於道一日内宴諢人因以諷之有持梅花而出者諢人指以問其徒曰此何物也應之曰芭蕉有持松檜而出者復設問亦以芭蕉答之如是者數四遂批其頰曰此某花此某朩何為俱謂之芭蕉應之曰我但見巴巴地討来都焦了天顔亦為之少破大學生鄭肅有進花石詩大寓規諫之意至今傳于世徐稚山徐林㳺定夫先生字之曰稚山紹興中坐趙忠簡公所引忤秦丞相意罷宗正少卿又以前任江西運使日嘗按秦之妻弟王昌秦夫婦銜之俄有將兩浙漕節者宻受風㫖誣劾公譏議均田良法安置興化軍秦死放還除户部侍郎事載紹興正論無菴崐山陳氏子名法全棄家從道川為僧叅請勤至一日行静濟殿前偶撞其首於柱間忽然大悟旁觀者見其光彩飛動而全自不知也自此遍走山林道價日増後住湖州道場山號無菴結帶巾宣和初予在上庠俄有㫖令士人結帶巾否則以違制論士人甚苦之當時有謔詞云頭巾帶誰理㑹三千貫賞錢新行條制不得向後長垂缺服相類法甚嚴人盡畏便縫濶大帶向前面繫和我太學先輩被人呌保義周妓下火文崐山有一名倡周其姓後係郡中籍張紫㣲作守時周忽暴死道川適訪紫㣲公因命作下火文云可惜許可惜許大衆且道可惜許箇甚麽可惜巫山一叚雲眼如新水㸃綘脣昔年繡閤迎仙客今日桃源憶故人休記醜奴兒怪臉便須抖擻好精神南柯夢斷如何也一曲離愁别是春大衆還知歿故某人向甚麽處去向這裏分明㑹得驀山溪畔芳草渡頭處處六么花十八其或未然與君一把無烟火燒盡千愁萬恨心諧謔雞冠花未放狗尾葉先生嘲葉廣文三間草屋田中舍兩面皮韁馬轡丞田馬自相謔冬𤓰少貌猶施粉甘蔗無才也著緋猜謎婦人富英對丁中散數行文字那箇漢書一簇人烟誰家莊子筵上枇杷宛類無聲之樂艸頭蚱蜢猶如不繫之舟酔公子酉生年九十柳青娘卯生年十八鏡上占錢銅聲相應馬前斷事鞍上治民鉏麑觸槐死作木邉之鬼豫讓吞炭終為山下之灰滕達道與鄭毅夫對思韓記韓正彦字師德魏公之猶子嘉祐中知崐山縣崐山號為難理而公能以静勝囹圄為之數空剏石堤疏斗門作塘長七十里而人不病涉得膏腴田百萬頃部使者以最上又請以輸州之賦十三萬從近便輸於縣鳩造塘餘材為倉廪以貯之民大恱比去遮道以留生為立祠作思韓記鑱諸石徐氏安人詩徐稚山侍郎有妹能詩大不類婦人女子所為其筆墨畦逕多出於杜子羙而清平沖澹蕭然出俗自成一家平生所為賦尤工有一文士嘗評之云近世陳去非吕居仁皆以詩自名未能逺過也有詩集傳於世吴中水利書宜興士人單諤嘗著呉中水利書其說謂蘇湖常三州之水瀦為太湖湖之水溢于松江以入海故少水患今吴江岸界於松江太湖之間岸東則江岸西則湖江東則大海也自慶歴二年欲便糧道遂築北隄横截江流五六十里遂致太湖之水常溢而不洩浸灌三州之田又覩岸東江尾與海相接之處汚下茭蘆叢生沙泥漲塞而又江岸之東自築岸以来沙漲今為民居民田矣雖増呉江一邑之賦而三州之賦不知反損幾百倍邪今欲洩太湖之水莫若先開江尾茭蘆之地遷沙村之民運其所漲之泥然後以呉江岸鑿其土為朩橋千所以通糧運隨橋谼開茭蘆為港走水仍於下流開白蜆安亭二江使太湖水由華亭青龍入海則三州水患必減元祐中東坡在翰苑奏其書請行之右中呉紀聞六巻凡二百二十五條宋宣教郎龔希仲譔及其子昱所叙行實附後熊之外王父王君家所藏前後散脫數紙先大父録本以傳先大父既歿熊於外家始覩元本缺帙比前甚多其後從人搜訪綴輯竟無此書今年冬㑹周君正道於呉城寓舍偶及此事周君以録本見示所存二百條其餘亦皆缺失遂得校正増補尚恨未完噫淳熙九年距今纔二百年而書僅存于世先大父之卒巳二十餘年猶未獲其全非區區留意郡志此書將泯沒而無聞矣士君子著述將垂不朽其傳之難必也如此豈不甚可惜哉因為記其大略以示来者云至正二十五年二月之吉武寧盧熊記呉中風土人文范文穆公呉郡志無餘憾矣崐山龔希仲又攷新舊圖經及地志不載者曰中呉紀聞命次子昱釐為六巻自叙云效范忠宣公東齋紀事暨蘇文忠公志林體皆取其有戒於人耳即中援引詩句居十之五徃徃借說詩寓感時索隠之意其巻首載范文正公條陳急務十條且云抱負竒偉不容不見于設施自非聖君賢相委曲信任之亦安能行其所學殆亦蹭蹬名塲昌黎所謂不得其平而鳴者歟二百年後武寜盧熊修蘇州府志輙取材焉讀其䟦可想見其尚友深情云或曰字熙仲宗元之曽孫父况與蘇過齊名于朝人號龔蘇居崑山黄姑别墅作期頥堂日飲其間年九十二臨終預知時至遺命二子晃昱曰毋設仙釋像于柩前供一花一水誦論語孝經足矣其孝行詳本傳虞山毛晉識傳云明之㓜事祖母李李自言少嘗大病夢神告曰與汝七十七及期果病且革明之齋心屏處夜禱于天乞减己五齡以益李夀灼香於頂者七聞腦中有爆裂聲不為動詰旦李病良愈又五年乃卒宣和三年明之以諸生貢京師迎父母徃巳而母與弟繼亡去鄊數千里貧無以歸𦵏或使以旅殯僧舍否則火之以其燼歸明之不從取其家所有自一錢之直皆折賣之不足又乞貸於人竟䕶二䘮以歸先墓在西山大朩數萬族人利其直悉斬而分之明之不能制獨泣且罵每伐一朩仆明之輙號慟響震林谷紹興二十年鄉貢年巳六十或勸少匿其數為異日計笑曰吾平生未嘗妄語且不敢自欺卒書其實晚以特恩廷試授高州文學年逾八十法不應出官呉士在朝者列奏其行義敕監潭州南嶽廟淳熙五年乞致仕鄉人奉直大夫林振等舉明之鄉曲儒宗經明行修議論操履衆所師法而窮居在下先是淳熙二年慶夀赦文内孝行節誼著于鄉閭仰長吏保明當議旌録時參政錢良臣謂明之無吏考難之呉仁傑曰公試與丞相敷陳必能動上聼良臣問故仁傑曰龔君頃以至行能動上帝是以知今日必能動人主因具言其事良臣為之竦然果得㫖超授宣教郎致仕仍賜緋衣銀魚時李衡以忠諫去國年幾八十德望絶人獨以兄事明之時人高之目為二老明之生平不摘人短不作貌言每自謂平日受用唯一誠字嘗附益山谷語以省喫儉用號五休居士中呉紀聞巻六
