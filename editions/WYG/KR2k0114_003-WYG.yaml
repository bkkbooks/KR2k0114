body:
  text: 中吳紀聞卷三宋龔明之撰葉道卿葉清臣字道卿少列之子天聖二年劉筠知貢舉得公所對策竒之擢為第二國朝以來以策擢髙第自清臣始寶元中為兩浙轉運使康定初知制誥慶歴初出知江寧府召入為翰林學士俄丁父憂有詔起復為邉帥力辭不行免喪知邠州改知澶州又改青州永興軍皇祐初復召入為三司使帝嘗訪以禦邉之䇿公對曰陛下御天下二十八年未嘗一日自暇逸叛羌黠虜頻年為患詔問輔翼之能方面之才與夫帥領偏裨當今孰可以任此者臣以為不患無人患有人而不能用爾今輔翼之臣抱忠義之深者莫如富弼為社稷之固者莫如范仲淹諳古今政事者莫如夏竦議論之敏者莫如鄭戩方面人才嚴重有紀律者莫如韓琦臨大事能斷者莫如田況剛果無顧避者莫如劉渙宏逺有方略者莫如孫沔至於帥領偏禆貴能坐運籌策不必親當矢石王徳用素有威名范仲淹深練軍政龎籍久經邉任皆良選也狄青范全頗能馭衆蔣偕沈毅有術略張亢倜儻有膽勇劉貽孫材武剛斷王徳基純慤勁勇此可補偏裨者也上用其言皆見任信未幾出守河陽卒公識度竒拔議論出人意表其立朝也數以忠言鯁論啓沃上心而媢忌者衆竟不果大用范文正公嘗為文祭之云濬學偉文發於妙齡天然清流不雜渭涇又云髙節莫屈直言屢諍朝廷風采搢紳輝映天子知人期以輔政弗諧而去能不曰命數語盡之矣觀風樓子城之西舊建樓其上名觀風范文正公作守時嘗賦詩云髙壓郡西城觀風不浪名山川千里色語笑萬家聲碧寺􅈣中靜紅橋栁際明登臨豈劉白滿目是詩情在唐但謂之西樓白樂天有西樓命宴詩後改為觀風今復名西樓矣三髙亭越上將軍范蠡江東步兵張翰贈右補闕陸龜䝉各有畫像在吳江鱸鄉亭之旁東坡先生嘗有吳江三賢畫像詩後易其名曰三髙且更為塑像臞菴主人王文孺獻其地雪灘因遷之今在長橋之北與垂虹亭相望石湖居士為之記程光祿程師孟字公闢所居在南園之側號晝錦坊自髙祖思為錢氏營田使因徙姑蘇擢景祐元年進士第知吉水錢塘二縣皆有政聲後通判桂州慶歴中詔近侍二十人各舉所知於是栁植施昌言薦公可任除知南康軍又知楚遂二州提㸃夔路刑獄屬嵗大饑公行部以常平粟賑民猶不足即奏發倉以濟之吏勸須報公曰本道至都五千里報至則民殍矣遂活飢民四十餘萬擢提㸃河東路刑獄岢嵐等郡無常平粟邉民飢或竄蕃境公得請出祠部牒募民納粟置廩以備荒嵗汾晉之旁山谷之水可以溉田公為釃渠續通泉源所溉者無慮萬頃召拜三司度支判官居一嵗知洪州興利除害一方甚賴之英宗即位召判三司都磨勘司委公商度河北四𣙜塲利害公請減物直償閣欠以來北賈使還除利州路轉運使江南西路轉運使始江西茶禁既通賦民納茶租謂之白紐錢民甚患之公奏令鬻茶者計斤輸秤頭錢代其數以寛民力至熙寧中以公之請頒下諸路俄𫝊交趾為冦遂以公直昭文館知福州一新學宮禮先生賢士以厚教育之意鐵錢亂幣公為罷之餼疾救荒蘇息以萬計閩中父老有云自國朝守吾郡者謝諫議泌以惠愛著蔡端明襄以威名顯兼之者惟公而巳移知廣州廣控蠻粤而無藩垣扞禦之備公至則請作西城廣踰十二里由是廣人有自安之計大修學校日引諸生講解負笈而來者相踵諸蕃子弟皆願入學秩滿除右諫議大夫再任公治廣六年威愛並行上遣中使撫問召判三班院遷給事中充集賢殿修撰判都水監改判將作監出知越州公至越寛猛適中而事自治民皆愛之又逾於洪福廣也官制行換太中大夫青社闕帥以通議大夫充京東安撫使朞年政成上疏告老遷正議大夫致仕哲宗即位授光祿大夫卒年七十八𦵏横山公強敏精察出於天性凡臨治五大鎮斷正滯訟辨活疑罪盖不可勝計所至之地囹圄空虚道不拾遺既去民為立祠刊石頌徳樂圃先生少許可至言公政事則曰雖韋丹治豫章孔戣帥嶺南常衮化七閩無以加也故天下以為才臣吏師有詩集二十巻奏議十五卷丁晉公飯僧疏丁晉公南遷日夢南嶽懶瓉禪師遂捨白金一笏飯僧于潭州自製齋疏云右伏以佛垂徧智道育群情凡欲拯於傾危必豫形於景貺某白衣干祿叨冢宰之重權丹陛宣恩忝先皇之優渥補仲山之衮雖曲盡於寸心和傅說之羮實難調於衆口嘗於安寢忽夢清容妙訓泠泠俾塵心而早悟真儀隱隱恨凡目以何知盖以智未周身事乖逺慮既禍臨而不測誠災及以非常出向西京感聖恩而寛宥竄於南裔當國憲以甘心咎實自貽孽非他作念一家而散地思萬里以何歸既為負國之臣永廢經邦之術程游湘土道假垔山正當煩惱之身忽接清閑之衆方知富貴難保始終直饒鼎食之榮豈若盂羮之美特形歸命恭發精誠捐施白金充羞淨供仰苾蒭之髙徳報懶瓉之深慈冀保此行乞無他患惟願天囘南睠澤賜下臨免致邉夷白日便同於鬼趣賜歸中夏黄泉亦感於君恩䖍罄丹誠永繫法力卑情不任激切之至補仲山之衮雖曲盡於寸心今多作巧心後人見晉公以智巧敗故改云惟其曲盡於巧心是以難調於衆口不知以巧對衆未如寸字為切蔡君謨題壁張子野宰吳江因如歸舊亭撤而新之蔡君謨題壁間云蘇州吳江之濵有亭曰如歸者隘壊不可居康定元年冬十月知縣事祕書丞張先治而大之以稱其名既成記工作之始以示于後郟正夫郟亶字正夫太倉人起於農家自幼知讀書識度不類凡子年甫冠登嘉祐二年進士第崑山自國朝以來無登第者正夫獨破天荒後住金陵遣其子僑就學於王荆公嘗有贄見詩云十里松隂蔣子山暮煙收盡梵宮寛夜深更向紫微宿坐久始知凡骨寒一派石泉流沆瀣數庭霜竹顫琅玕大鵬汎有搏風便還許鷦鷯附羽翰荆公一見竒之今集中有謝郟亶祕挍見訪於鍾山詩云誤有聲名只自慙煩君跋馬過茅簷巳知原憲貧非病更許莊周智養恬世事何時逢坦蕩人情隨分值猜嫌誰能胸臆無塵滓使我相從久未厭自此聲價頗重熙寧中為司農寺丞上書言水利朝廷以其工大役重頗難之正夫條水之利害著成一書今刊行於世未幾復司農寺丞除江東運判元祐初入為太府寺丞出知溫州以比部郎中召未至而卒年六十有六𦵏於太倉孫升卿登第守徽常二州公初授睦州團練推官知杭州於潛縣未赴以水利役法鹽銅鐵五利獻諸朝丞相王文公安石竒之除司農寺丞旋出提舉兩浙水利議者以其說非便遂罷免已而歸治所居之西積水田曰大泗灢者如所獻之說為圩岸溝洫井舍場圃俱有井田之遺制於是嵗入甚厚即圖其狀以獻且以明前日之法非茍然者復召為司農寺主簿稍遷丞預修司農寺勅式頗號完密除江東路轉運判官陳殿丞殿中丞陳質徳行著於鄉里其死也范文正公挽之云賢者逝如此皇天豈易知衆人皆墮淚君子獨安卑幾世𫝊清白滿鄉稱孝慈賢哉生令嗣遺秀在蘭芝公生二子曰郢曰之竒皆為吳中髙士鬱林石陸龜䝉居臨頓里其門有巨石逺祖績嘗仕吳為鬱林太守罷歸無裝舟輕不可越海取石為重人稱其㢘號鬱林石謝希深謝絳字希深太子賔客濤之子大中祥符八年登進士甲科楊文公薦其才召試館職充祕閣挍理景祐元年丁父憂服除召試知制誥歐陽文忠公嘗云三代以來文章盛者稱西漢公於制誥尤得其體常楊元白不足多也寶元初知鄧州卒年四十有五公自少而仕凡五十年間自守不回而外亦不甚異一時賢士大夫無不敬之子景初景溫皆為時名儒范文正公還鄉文正公自政府出歸鄉焚黄未至近邑先投逺狀或以為太過公曰維桑與梓必恭敬止敢不盡禮乎既至搜外庫惟有絹三千疋令掌吏錄親戚及閭里知舊自大及小散之皆盡曰宗族鄉黨見我生長幼學壯仕為我助喜我何以報之又買負郭常稔之田千畝號曰義田以濟養群族擇族之長而賢者一人主之其計日食人米一升嵗衣人二縑嫁女者錢五十千娶婦者二十千再嫁者三十千再娶者十五千𦵏者如再嫁之數𦵏幼者十千族之聚者九十口嵗入粳稻八百斛以其所入給其所聚仕而家居俟代者預焉仕而之官者罷其給公雖沒後世子孫至今修其業承其志如公存也清逺道士詩清逺道士與沈恭子游虎邱寺詩云我本長殷周遭罹歴秦漢四瀆與五嶽名山盡幽竄及此寰區中始有近峰翫近峰何鬱鬱平湖渺瀰漫吟挽川之隂步上山之岸山川共澄澈光彩交凌亂白雲蓊欲歸青松忽消半客去川島靜人來山鳥散谷深中見日崖幽曉非旦聞子盛遊遨風流足詞翰嘉兹好松石一言常累歎勿謂予鬼神忻君共幽讃清逺道士竟不知其為何人以鬼神自謂亦怪之甚者顔魯公李徳裕皮日休陸龜䝉皆有和篇沈恭子亦莫詳其因詩中有風流詞翰之稱必神怪之儔也幽獨君詩唐時虎邱石壁隱出幽獨君詩二首其一云幽明雖異路平昔忝工文欲知潛寐處山北有孤墳其二云髙松多悲風蕭蕭清且哀南山接幽壠幽壠空崔嵬白日徒昭昭不照長夜臺雖知生者樂魂魄安能囘況復念所親慟哭心肝摧慟哭更何言哀哉復哀哉其辭甚竒愴後人又有賦答幽獨君一詩不知誰氏所作本禪師宗本圓照禪師乃福昌一飯頭福昌承天寺子院懵無所知每飯熟必禮數十拜然後持以供僧一日忽大悟恣口所言皆經中語自此見道甚明後住靈巖近山之人遇夜則面其寢室拜之侍僧以告遂置大士像於前人有飯僧者必告之曰汝先養父母次辦官租如欲供僧以有餘及之徒衆在此豈無望檀那之施須先為其大者其它率以是勸人仁宗嘗召至京師賜金襕衣加圓照師號後復歸本山舊𫝊宗本至京師有一貴戚欲試之因以猾倡薦寢本登榻鼻息如雷其倡為般若光所爍通夕不寐翌旦炷香拜之曰不意今日得見古佛吳王拜郊臺吳王拜郊臺在横山之上今遺跡尚存春秋時王政不綱以諸侯而為郊天之舉僭禮亦甚矣范貫之范師道字貫之文正公之妷登天聖八年甲科嘗知廣徳縣有治狀孫甫之翰薦之通判許州至和元年吳育春卿薦公召拜侍御史公之少也有經綸天下之志其長也遇事未嘗屈及為上耳目蚤夜思所以稱職者始見上即陳願擇賢相以久其任既而論奏二府與近侍不法事上多用其言俄出知常州御史府極言其不平宰相亦以是罷去而公之名迹愈聞天下移廣東路轉運使又移兩浙未幾拜起居舍人同知諌院嘉祐四年百官上尊號公獨諫以為無益於治體而有損聖主謙尊之徳至言諸閤女御例遷因災異以明天意上皆深然之兼遷侍御史知雜事㑹大臣居機宻者無逺謀繼而進者復不協時論公論列甚切上雖納其奏然用是出知福州召為三司鹽鐵副使嘉祐八年以疾請郡除户部郎中直龍圖閣知明州下車未久卒年五十有九公出入臺諫凡九載朝廷之事聞無不言言必欲行如擇宗室以備問安之職請士大夫終𦵏始得從仕限民田以均民産抑貪墨以清守令止内降以杜漸立私廟以廣孝擇知典故近臣以任太常禮樂之官減色役以恤民力之困皆天下之急務而衆所願行者有奏議二十卷文集五十巻嘗為唐史著君臣治忽之迹命藏祕閣有詔襃美子世京世亮皆舉進士第所居在承天寺前號豸冠坊𦵏天平山趙清獻公誌其墓南翔寺崑山縣臨江鄉有南翔寺初寺基出片石方徑丈餘常有二白鶴飛集其上人皆以為異有僧號齊法師者謂此地可立伽藍即鳩財募衆不日而成因聚其徒居焉二鶴之飛或自東來必有東人施其財自西來則施者亦自西至其它皆隨方而應無一不驗久之鶴去不返僧號泣甚切忽於石上得一詩云白鶴南翔去不歸惟留真跡在名基可憐後代空王子不絶薫修享二時因名其寺為南翔寺之西又有村曰白鶴張敏叔張景修字敏叔人物蕭灑文章雅正登治平四年進士第雖兩為憲漕五領郡符其家極貧窶僦市屋以居嘗有絶句云茅簷月有千金稅稻飯年無一粒租生事蕭條人問我水芭蕉與石菖蒲觀其詩大抵多清淡嘗題集清軒詩云洗竹放教風自在傍溪看得月分明又多好用俗語如得五品服詩云白快近來逢素鬂赤窮今日得朱袍又謝人惠油衣詩云何妨包裹如風藥且免淋漓似水雞盖以文滑稽也舊嘗作古風送朱天錫童子云黄金滿籝富有餘一經教子金不如君家有兒不肯娱口誦七經隨巻舒渥洼從來産龍駒鸑鷟乃是真鳯雛一朝過我父子俱自稱窮苦世為儒雪窻夜映孫康書春隴晝荷兒寛鋤翻然西入天子都出門慷慨曳長裾神童之科今有無談經射䇿皆壯夫古來取士凡數塗但願一一令吹竽甘羅相秦理不誣世人看取掌中珠折腰未便賦歸歟待君釋褐還鄉閭初景修為汝州梁令作此詩天錫既到闕下忘取本州公據為禮部所却因擊登聞鼔繳景修詩為證神宗一見大稱賞之翌日以語宰相王珪而恨四方有遺材即令召對珪言不欲以一詩召人恐長浮競不若俟其秩滿然後擢用之遂止令中書籍記姓名比罷官而神宗已升遐矣景修歴仕三朝每登對上必問聞卿作朱童子詩試為舉似由此詩名益著終祠部郎中年七十餘卒平生所作詩幾千篇號張祠部集子漢之漢之嘗宰崑山頗緩於索租邑人戲云渠家自來無此故不與人索也敏叔有花客詩十二章梁縣屬汝州崑山夫子廟唐制郡邑皆得置夫子廟自黄巢之亂存者無幾崑山之廟更五代六十年不建自本朝太平興國三年錢氏納土請吏朝廷始除守以治之至雍熙初徴事郎邉倣首為崑山宰因其遺址重立夫子廟門闕甚麗狀十哲像於其旁王元之為作記景祐初范文正請立郡庠於是縣亦有學矣孫子和孫沖字子和登熙寧六年進士第少負才名為荆公之客嘗著鄉黨傅說二論荆公甚竒之後宰和之含山號為循吏律巳甚正一毫無妄取秩滿率家人解其歸裝老獲有蓄一砧者子和視之曰非吾來時物也命還之其它大率類此鶚章交上改宣徳郎未幾卒于京師年三十有五無子以族妷畯為嗣畯嘗倅江州終朝請大夫子和妻予之姑氏又與叔祖朝議為同年叔祖嘗以詩挽之云結髮欣同籍聫姻喜素風期君千里逸耀我一枝窮新命拖紳後殘編旅笥中空餘循吏𫝊紀次在元豐張翰東晉張翰吳人仕齊王冏不樂居其官一日在京師見秋風忽起因作歌曰秋風起兮佳景時吳江水兮鱸正肥三千里兮家未歸恨難得兮仰天悲遂棄官而還國初王贄運使過吳江有詩云吳江秋水灌平湖水濶煙深恨有餘因想季鷹當日事歸來未必為􅐜鱸贄之意謂翰度時不可有為故飄然引去實非為鱸也至東坡賦三賢詩則曰浮世功名食與眠季鷹真得水中仙不須更說知幾早直為鱸魚也自賢其說又髙一著矣皮日休皮日休字襲美唐咸通十年為郡從事居官纔一月陸魯望以所業見之自此交從甚密更迭唱和無慮數百篇總目之曰松陵集松陵吳江别名也日休自有著述號鹿門子書橋名城中有橋梁三百六十所每橋刻名於旁者始於郡守韓子文度支兵火後間有缺者福昌長老正橋頗具眼禪林多宗之一日升堂有問話者云蘇州三百六十座橋那座是正橋答云度驢度馬賀方囘賀鑄字方囘本山隂人徙姑蘇之醋坊橋方囘嘗游定力寺訪僧不遇因題一絶云破氷泉脈潄籬根壊衲猶疑掛樹猿䗶屐舊痕渾不見東風先為我開門王荆公極愛之自此聲價愈重有小築在盤門之南十餘里地名横塘方囘往來其間嘗作青玉案詞云凌波不過横塘路但目送芳塵去錦瑟華年誰與度月橋仙館綺窻朱户唯有春知處碧雲冉冉衡臯暮綵筆新題斷腸句試問閑愁知幾許一川煙草滿城風絮梅子黄時雨後山谷有詩云解道江南斷腸句只今唯有賀方囘其為前輩推重如此初方囘為武弁李邦直為執政時力薦之其略謂切見西頭供奉官賀某老於文學泛觀古今詞章議論逈出流輩欲望改換一職令入文資以示聖時育材進善之意上可其奏因易文階積官至正郎終於常倅白公檜白樂天為守時恩信及民皆敬而愛之嘗植檜數本於郡圃後人目之為白公檜以況甘棠焉癸甲先生潘勺字叔治登進士第為吳興郡掾後絶意祿仕徧遊天下佳山水嘗為雁蕩百詠其末云都為畫工圖不得一時收拾作詩歸自號癸甲先生或問其故曰始終之義也後果以癸日亡甲日殮方子通方惟深字子通本莆田人其父屯田公𦵏長洲縣因家焉最長於詩嘗過黯淡灘題一絶云溪流怪石礙通津一一操舟若有神自是世間無妙手古來何事不由人王荆公見之大喜欲收致門下盖荆公欲行新法沮之者多子通之詩適有契於心故為其所喜也後子通以詩集呈荆公侑以詩云年來身計欲何為跌宕無成一軸詩懶把行藏問詹尹願將生死遇秦醫丹青效虎留心拙斤匠良工入手遲此日知音堪屬意枯桐正在半焦時凡有所作荆公讀之必稱善謂深得唐人句法嘗遺以書曰君詩精淳警絶雖元白皮陸有不可及子通游王氏之門極䝉愛重初無一毫迎合意後以特奏名授興化軍助教隱城東故廬與樂圃先生皆為一時所髙每部使者及守帥下車必即其廬而見之前後上章論薦者甚衆子通竟無祿仕意其於死生禍福之理莫不超達嘗造一園亭不遇主人自盤礴終日因題於壁閒云何年突兀庭前石昔日何人種松柏乗興閑來就榻眠一枕春風君莫惜城西今古陽山色城中誰有千年宅往來何必見主人主人自是亭中客其灑落類如此仲殊一日訪子通有絶句云多年不見玉川翁今日相逢小榭東依舊清涼無長物只餘松檜養秋風可見其清髙矣年八十三而卒有詩集行於世無子一女適樂圃先生之子發破山詩常建詩云竹逕通幽處禪房花朩深山光悅鳥性潭影空人心此題常熟破山也舊𫝊有四髙僧講經山中一老翁日來聽法久之問翁所從來答曰吾非人也龍也因問本相可得見乎曰可巳而果以全體見僧恐甚亟誦掲諦呪語掲諦神與龍角力龍不能勝破其山而去續圖經所載不同謂白龍與一龍鬭未知孰是甫里甫里在長洲縣東南五十里乃江湖散人陸龜䝉魯望躬耕之地散人廟食於此一方之人至今想其髙風常誇示於四方以為榮焉唐書云散人乃唐相元方七世孫又自號天隨子著笠澤叢書若干巻有脚書厨叔祖諱程字信民剛正自守不惑於禍福嘗憤聖道不明欲排異端之學家不置釋老像祭祀未嘗焚紙錢儒家甚宗之自幼讀書于南峰山先都官墓廬攻苦食淡手未嘗釋巻記問精確經𫝊子史無不通貫鄉人號為有脚書厨嘗題一絶於壁間云月度疎􅎉起更慵坐聽澄照五更鐘却思潮上西興急風遶山前萬箇松登熙寧六年進士第歴西安丞桐廬令子況既登郎省贈左朝議大夫泰娘泰娘吳之美婦人也劉禹錫詩云有時粧成好天氣走上臯橋折花戲風流太守韋尚書路傍忽見停隼旟南園詩南園乃廣陵王舊圃中有流盃旋螺亭亞於滄浪之景王黄州為長洲時無日不攜客醉飲嘗賦詩云他年我若功成後乞取南園作醉鄉今園中大堂遂以醉鄉名之大觀末蔡京罷相欲東還詔以其園賜之京即以詩贈親黨云八年帷幄竟何為更賜南園寵太師堪笑當時王學士功名未有便吟詩黄州之詩不過寓意爾京遽以無功名誚之黄州雖終為黜臣其名與天地同不朽京居相位二十年又處師垣之尊至今雖三尺之童唾罵不巳其賢不肖何如也朱子奢朱子奢蘇州人太宗時為𢎞文館學士帝嘗詔起居記錄臧否朕欲見之子奢曰陛下舉無過事雖見無嫌然以此開後世史官之禍可懼也帝深納之見唐書儒學𫝊錢氏納土太平興國三年陳洪進奉表獻漳泉兩郡詔授洪進武寧軍節度使留京師奉朝請是嵗錢忠懿王俶上表獻十三州之地錢氏納土盖在陳氏之後或說以為興國二年非也白馬磵南峰山北有聚落號白馬磵昔支遁騎白馬而來飲於磵中因以名焉山之巔有石埳然號馬跡石又有一石室號支遁菴乃其修習之地也禪月大師萬夀寺有禪月閣禪月者唐僧貫休也生於婺之蘭溪自祝髪為僧徧㕘名徳又善作詩文有西嶽集行於世性好圖畫古佛嘗有夢得十五羅漢梵相既而尚缺其一未能就夢中復有告之曰師之相乃是遂如所告因照水以足之今其畫尚𫝊既至吳寓跡萬夀甚久後入蜀死𦵏于成都平生行業具載白蓮塔銘中吳紀聞巻三
