body:
  text: 中吳紀聞巻二宋龔明之撰姚氏三瑞堂閶門之西有姚氏園亭頗雅致姚名淳家世業儒東坡先生往來必憩焉姚氏素以孝稱所居有三瑞堂東坡嘗為賦詩云君不見董召南隱居行義孝且慈天公亦恐無人知故令雞狗相哺兒又令韓老為作詩爾來三百年名與淮水東南馳此人世不乏此事亦時有楓橋三瑞皆目見天意宛在虞鰥後惟有此詩非昔人君更往求無價手東坡未作此詩姚以千文遺之東坡答簡曰惠及千文荷雅意之厚法書固人所共好而某方欲省緣除長物舊有者猶欲去之又況復收邪固卻而不受此詩既作之後姚復致香為惠東坡於虎邱通老簡尾云姚君篤善好事其意極可嘉然不須以物見遺惠香八十罐却託還之巳領其厚意與收留無異實為它相識所惠皆不留故也切為多致此懇予家藏三瑞堂石刻每讀此則歎美東坡之清徳誠不可及也丁氏賢惠錄丁氏賢惠錄安定先生文蘇子美書丁氏乃晉公之女弟陳君子之母也封長安縣君賢行甚著晉公鍾愛其甥欲官之丁氏固辭俾其以學術進晉公竦然稱歎巳而同其弟繼登進士科觀此足以知夫人之賢矣里人張紳世與陳舊其婦㝃而沒夫人褓其嬰歸付乳媼親加撫視能言而還之相兄既南謫家日淪困有妷孫女幼孤夫人訓育篤於巳生及歸馮氏子婦式閑淑甚宜其家時工部黄郎中宗旦守蘇聞而謂人曰兹事可書于史張文定公知崑山張文定公方平景祐中宰崑山時蔣堂侍郎為郡守得公著芻蕘論三十篇上之因舉為賢良公知崑山時吳越歸國未甚久郡邑地曠民占田無紀嵗逺多侵越訟數十年不能決公召問所輸租稅幾何大約百一二悉收其餘以賦貧民自是無訟𫝊燈錄永安禪院僧道元纂佛祖訖近世名僧禪語為𫝊燈錄三十巻以獻祥符中詔翰林學士楊億知制誥李維太常丞王曙刋定刻板宣布曾大父曾大父諱宗元字會之自幼穎悟絶人讀書於虎邱寺晝夜不絶舉進士為鄉里首選繼登天聖五年第主杭州仁和縣簿時范文正公為帥改容禮之曰公器業清修他日必為令器謹勿因人以進曾大父敬服其訓髙祖既抱疾因乞便省親移吳簿後以居憂服闋調建安尉藹有稱聲保任者二十有二章召見改大理寺丞知句容縣發擿姦伏政如神明葉道卿内翰時開府金陵甚為之前席楊紘持使節行部號為深酷吏望風投劾而去紘過境上獨不入縣或問其故紘曰龔君治民所至有聲吾往徒為擾耳其見重如此自登朝未嘗游公卿之門皆文正公之教也士論美之嘗通判衢越二州終都官員外郎𦵏南峰山有文集十巻號武邱居士遺藁子程孫況俱擢第曾大父善作詩嘗有六月吟云曦輪獵野枯杉松火焚泰華雲如峰天地爐中赤􅈣起江湖喣沬烹魚龍生獰渇獸脣焦斷峻翮無聲落晴漢飢民逃生不逃熱血迸背皮流若汗玉宇清宮徹羅綺渇嚼氷壺森貝齒炎風隔斷真珠簾池口金龍吐寒水象床珍簟凝流波瓊樓待月微酣歌王孫晝夜縱娛樂不知苦熱還如何夜宴詩云魄侵堦夜三刻蜀錦堆香花院窄風動簾旌玳瑁寒露垂蟲網真珠白美人正席羅絃管綺幄雲屏爐麝暖只恐金壺漏水空不怕鸞觴琥珀滿勸君莫負秉燭游曾見古人傷晝短贈處士林逋詩云髙蹈遺塵蛻含華傲素園璜溪頻下釣蕙帳不驚猿養浩時清嘯忘機只寓言幾囘生蝶翅明月在西軒送陳君子之四明詩云短亭祖帳接平川栁拂迴波繫画船漸向落暉分繡袖忍聽離曲怨鵾絃雲連稽嶺應懐古路近花源好訪仙那更慿髙望天際江堤烟重草綿綿搗砧詞云星河耿耿寒􅈣浮白龍銜月臨霜樓誰家砧㺯細腰杵一聲搗破江城秋雙桐老翠墮金井髙低冷逐西風𦂳靜如秋籟暗穿雲天半驚鴻斷斜影哀音散落愁人耳何處離情先喚起長信宮中葉滿堦洞庭湖上波平水萬里征衣成未成搖風搗月何丁丁楚闗秦嶺有歸客一枕夜長無限情曾大父嘗以所業投范文正文正曰子之文溫厚和平而不乏正氣似其為人也世以為確論云婁侯崑山乃古之婁縣今縣之東北三里有一聚落尚以婁縣為名或云在漢為疁後避錢王諱改今名予攷三國志張昭拜輔吳將軍封婁侯則縣之為婁舊矣漢書云改於王莽時滕章敏公滕元發名甫避髙魯王諱以字為名更字達道九嵗能賦詩敏㨗過人范文正之父為諸舅見而竒之教以為文文正為鄉郡而安定胡先生居於郡學公往從之門人以千數第其文常為首舉進士試于廷宋景文公竒其文擢為第三以聲韻不中程黜之其後八年復中第三通判湖州時孫威敏公沔守錢唐一見曰後當為賢將授以治劇守邉之要召試學士院判吏部南曹同修起居注知制誥知諫院王陶論宰相不押班為䟦扈上以問公公曰宰相固有罪然以為跋扈則臣以為欺天陷人矣知開封府遷御史中丞抗論得失為多出知秦州河朔地震壊城池廬舍命公為安撫使還復知開封府除翰林學士出知鄆州移定州入覲力言新法之害至定虜人畏服上喜令再任詔曰寛嚴有體邉人安焉因作堂以安邉名之又上疏論新法徙青州留守南都知蒲鄧二州坐累知安州侍郎韓丕旅殯於安五十年矣學士鄭獬安人也既没十年貧不克𦵏公皆𦵏之以言者復貶筠州巳而為湖州哲宗即位徙蘇揚二州除龍圖閣直學士復知鄆州嵗方饑乞淮南米二十萬石為備全活五萬人徙真定河東除龍圖閣學士復知揚州未至而卒年七十一贈左銀青光祿大夫諡曰章敏𦵏陽山公屢領帥權條畫皆有方議者謂近世名將無及公者朝廷雖知公之深而終不大用每進小人必讒之公嘗上章自訟有曰樂羊無辜謗書滿篋即墨何罪毁言日聞天下聞而悲之滄浪亭滄浪亭在郡學之東中吳軍節度使孫承祐之池館其後蘇子美得之為錢不過四萬歐公詩所謂清風明月本無價可惜只賣四萬錢是也予家舊與章莊敏俱有其半今盡為韓王所得矣范文正公復姓范文正公幼孤隨其母適朱氏因從其姓登第時姓名乃朱說也後請于朝始復舊姓表中改用鄭準一聫云志在投秦入境遂稱於張祿名非伯越乗舟偶效於陶朱范蠡范雎事在文正用之尤為切當今集中不載鄭宣徽鄭戬字天休居臯橋天聖初登進士第嘗知開封府發擿姦伏都下肅然遷三司使知樞宻院俄以資政殿學士知杭州移鎮長安有表曰聽嚴宸之鐘鼓未卜何晨植勁柏於雪霜更觀晚節上稱誦者數四謂左右曰戩氣質英豪朕欲用為宰相故屢試於外也慶歴三年代范文正為四路都招討元昊畏其威再知長安蕃酋部將遮道卧轍不得行六年移并州㝷拜宣徽使奉國軍節度使未幾薨贈太尉諡文肅𦵏横山五栁堂五栁堂者胡公通直所作也其宅乃陸魯望舊址所謂臨頓里者是也公諱稷言字正思兵部侍郎則之妷少學古文於宋景文又嘗獻時議於范文正晚從安定先生之學皆䝉愛奬後以特奏名拜官調晉陵尉又主鄞縣簿又為山隂丞自度不能究其所施乃乞致仕陞朝之後曽賜緋衣銀魚公既吿老即所居疏圃鑿池種五栁以名其堂慕淵明之為人賦詩甚衆公自中年清修寡慾延納後進談論不少休日入後不飲食率以為常或與客夜坐久不過具湯一杯而巳年八十餘而終江諫議公望為誌其墓子嶧中隱堂三老曾大父自都官員外郎分司南京謝事家居所居在大酒巷取白樂天大隱住朝市小隱入邱樊不如作中隱隱在留司間之詩建中隱堂與尚書屯田員外郎程適太子中允陳之竒相與游從日為琴酒之樂至於窮夜而忘其歸二公皆耆徳碩儒致政於家吳人謂之三老林氏儒學之盛林氏本福清人徙居吳門有諱概者嘗為省試第一登載國史儒學𫝊其子曰希旦邵顔相繼俱登科級希為樞宻諡文節旦為殿中侍御史邵為顯謨閣直學士諡文肅顔為光祿卿希之子虞中詞科旦之子虙亦登第邵之子攄賜出身為中書侍郎近世儒門之盛必推林氏云國一禪師國一禪師乃崑山圓明村朱氏子捨俗為僧受業於景徳寺法名道欽因游歴叢林遇一有道者語之云乗流而行遇徑而止既至雙徑遂借龍潭築菴於其上即開山之祖也事載塔銘云今慧聚寺之西有以羅漢名橋者盖指國一云葉少列葉㕘字少列嘗守此郡既謝事因居焉其子清臣登禁從少列猶及見之范文正公嘗贈之詩云退也天之道東南事了人風波抛舊路花月伴閑身湖外扁舟逺門中駟馬新心從今日泰家似昔時貧見子登西掖擕孫過北隣白雲髙閣曙綠水後池春尊酒呼前輩爐香叩上真只應隂徳在八十富精神其居第在天慶之東中有七檜堂内翰道卿嘗持本路漕節侍養道卿之子公秉又嘗守鄉郡搢紳榮之善巻寺丞乃内翰之孫長於詩與祠部叔父唱和甚多其姪主簿公娶叔祖四朝議之女二游詩吳之士有恩王府㕘軍徐修矩者守世書萬巻酣飲於其間至日晏忘飲食又有前涇縣尉任晦其居有深林曲沼危亭幽砌皮日休嘗游二君宅每為浹旬之欵篇章留贈不一號二游詩安定先生胡翼之本海陵人學者尊其道稱為安定先生景祐中范文正公薦先生白衣對崇政殿授祕書省挍書郎文正上疏請建郡學首以先生為吳興學官繼移此邦先生居學嚴條約以身先之雖大暑必公裳終日延見諸生以嚴師弟之禮解經有至要義􅈤􅈤為諸生論其所以治巳而治人者學徒千數日月刮劘為文章皆傅經義必以理勝信其師說崇尚行實自後登科為大儒者累世不絶如滕章敏范忠宣錢内翰醇老皆從先生之學者也至今學宮畫像而祠之蘇子美飲酒子美豪放飲酒無算在婦翁杜正獻家每夕讀書以一斗為率正獻深以為疑使子弟密察之聞讀漢書張子房𫝊至良與客狙擊秦皇帝誤中副車遽撫案曰惜乎擊之不中遂滿引一大白又讀至良曰始臣起下邳與上會於留此天以臣授陛下又撫案曰君臣相遇其難如此復舉一大白正獻公知之大笑曰有如此下物一斗誠不為多也張伯玉郎中張伯玉字公達嘗為郡從事剛介有守文藝甚髙范文正公深愛之嘗舉以應制科舉詞云張某天賦才敏學窮閫奥善言皇王之治博達古今之宜素蘊甚充清節自處堪充應賢良方正能直言極諫科其應詔也又作上都行送之果中髙選伯玉在蘇日述作並見蓬萊集上方詩唐孟郊因其父為崑山尉嘗至山中題詩於上方云昨日到上方片霞封石床錫杖莓苔青袈裟松柏香晴磬無短韻晝燈含永光有時乞鶴歸還放逍遙塲其後張祐嘗有詩云寶殿依山險凌虚勢欲吞畫簷齊朩末香砌壓雲根逺景窻中岫孤煙竹裏村凭髙聊一望歸思隔吳門皇祐中王荆公以舒倅被㫖來相水事到邑巳深夜􅋈舟寺之前秉火炬登山閱二公之詩一夕和竟詰旦即囘棹其詩云僧蹊蟠青蒼莓苔上秋牀霜翰飢更清風蘤逺亦香埽石出古色洗松納空光久游不忍還迫迮冠盖塲峰嶺互出没江湖相吐吞園林浮海角臺殿擁山根百里見漁艇萬家藏水村地偏來客少幽興祗桑門此四詩為山中之絶唱陳龍圖使髙麗陳睦字子雍嘉祐六年登進士科名在第二治平中詔舉館閣才行之士子雍與劉攽李常寧李清臣輩首被選擢熙寧元豐間髙麗屢航海修貢朝廷以為恭選使往諭之初命林希子中力辭更命睦睦即日就道神宗大喜語輔臣曰林希無親堅辭不行陳睦親在乃不憚於往因出希知池州假睦起居舍人直昭文館特賜黄金帶受命七日而行渉海踰月出入驚濤中遂抵其國使還乃真拜所假官職且令服所賜黄金帶又賜黄金盞於令式外以為寵俄直龍圖閣知潭州卒墓在南峯山三子彦文經仲嘗躋法從彦武緯叔為提舉官初林希樞密買卜於京師孟診為作卦影畫紫袍金帶人對大水而哭林以為髙麗之役渉瀚海故力辭之後出知池州繼遭喪禍其驗不在彼而在此信知禍福不可避也朱樂圃先生朱長文字伯原未冠擢進士第英聲振于士林元祐初充本州教授入朝除祕書省正字樞密院編修官後以疾解任退居于家所居在雍熙寺之西號樂圃坊地有髙岡清池喬松夀檜先生以志不得達棲隱于中潛心古道篤意著述人莫敢稱其姓氏但曰樂圃先生樂圃在錢氏時號金谷方子通嘗有詩云吳門此圃號金谷主人瀟洒能文章子通又嘗著樂圃十詠一曰樂圃二曰邃經堂三曰琴臺四曰墨池五曰魚溪六曰詠齋七曰灌園亭八曰見山岡九曰峨冠石十曰冽泉井常公安民嘗造先生隱居愛其趣識志尚灑然有異於人而惜其遺逸沈晦因觀所著續圖經遂作序以紀之海涌山虎邱舊名海涌山闔閭王既𦵏之後金精之氣化為虎踞其墳故號虎邱山椒有二伽藍列為東西白樂天有東武邱西武邱詩顔魯公亦云不到東西寺於今五十春今之西菴西武邱也虎字避唐諱改曰武盧通議盧革字仲辛本徳清人少竒穎舉神童年十六擢進士乙科慶歴間知龔州時蠻人入㓂桂管公經畫軍須以應辦聞歴婺泉二州除廣南提㸃刑獄福建湖南兩轉運使力請郡以自効神宗嘉之顧執政曰盧革恬退如此可與一佳郡遂除宣州未幾告老遷光祿卿致仕以子貴進祕書監太子賔客官制行改太中大夫哲宗踐阼遷通議大夫退居于吳十五年年八十二卒子秉今盧提刑橋即公所居之地也先殿院既以散秩養痾日與賔客酌酒賦詩自娛公誠慤莊重有前輩之風先殿院雅好其為人朝夕與之議論公性不甚飲每勸之酒至三分則起而拱手曰已三分矣至五分則曰巳五分矣其他率以是應之既去先殿院審執事者皆曰客之言毫髮不妄由是益器重之閶門樓詩閶門舊有樓三間予猶及見之陸機吳趨行云閶門何峨峨飛閣跨通波重欒承游極囘軒啓曲阿蘇子美詩云年華冉冉催人老雲物蕭蕭又變秋家在鳯凰城下住江山何事苦相留更建炎兵火不復存矣章守子用皂葢元豐中章岵岷之弟朝議為郡守剛介不可屈人因目之曰章硬頸其子出入用皂絹葢肩輿不過二人隨緣居士黄策字子虚彦之子中進士乙科為雍邱縣主簿元符末詔許中外言事時昭慈既復位號典册有未盡正者因上書引古義力爭之崇寧初黨論起名入黨籍羈置登州會赦還鄉里遂休官號隨緣居士欽宗嘗書隨緣二字賜之藏宸翰於家著隨緣居士記書之於壁建炎中追錄黨人除直祕閣公無疾端坐而逝𦵏光福山自題其墓曰隨緣居士之塔石㸃頭今虎邱千人坐旁有石㸃頭十道四蕃志云生公異僧竺道生也講經於此無信之者乃聚石為徒與譚至理石皆為㸃頭軌革卦影韓中孚字應天將游上庠聞市肆有精軌革術者應天筮之畫一金章紫綬人有賁色瓶在其旁後有一人處圓圈中術士謂之曰君此行未必到闕中途必為貴人所留應天未之信行次南徐適朱行中龍圖為郡守與之厚善聞其來倒屐迎之延於郡圃朱平生愛一賁色酒壺因宴出示之圃中有草菴其狀甚圓應天寢於其間與卦影所畫無一不驗以此知不惟飲啄前定雖受用之物寢處之地亦非偶然者賁色一作祕色夢石天王像後唐時慧聚寺有紹明律師僧中傑出者居半山彌勒閣一夕夢神人曰簷前古桐下有石天王像與銅鐘師宜知之詰旦掘其地果獲此二物今尚龕置壁間形製極古故前輩有詩云一旦石像欲發現先垂景夢鳴髙岡常熟破山恩髙僧嘗學于紹明見本朝僧史改正洪範余燾字元輔方舍法欲行上書引成周事力贊之因命以官累遷至正郎後復上書改洪範篇自王省惟嵗月之從星則以風雨乃屬之四五紀一曰嵗二曰月三曰日四曰星辰五曰歴數之下謂九疇皆有衍文惟四五紀無之至於八庶徴之後既言肅時雨若止䝉常風若意巳斷矣而又加王省惟嵗以下之文則近於贅或者是其說然為臺諫所彈不果施行范文正四子文正四子純佑字天成純仁字堯夫純禮字彞叟純粹字德孺長子少有大志惜乎享夀不遐終軍器簿堯夫位丞相彝叟為右丞德孺亦躋法從平時文正喜收接名士如孫明復胡安定之徒皆出其門朝夕與其子弟講論道德故賢行成於所習云林酒仙國初時長洲縣東禪寺有僧曰遇賢姓林氏以其飲酒無算且多靈異故鄉人謂之林酒仙口中可容兩拳嘗醉於酒家每出群聚而觀之者不絶能自圖其形無毫釐不相似好賦詩雖多俗語中含理致然亦有清婉者如云揚子江頭浪最深行人到此盡沈吟它時若向無波處還似有波時用心門前綠栁無啼鳥庭下蒼苔有落花聊與東風論箇事十分春色屬誰家心閑增道氣忍事敵災屯謹言終少禍節儉勝求人若此之類皆名言也真身塑寺中章岷章岷字伯鎮嘗為平江軍推官文聲甚著與曾大父同登天聖五年第情好極密髙祖殿院墓銘乃其所作也范文正公有和章岷從事鬭茶歌及同登承天寺竹閣詩鮠魚鮠廣韻吾灰切魚名似鮎集韻吾囘切魚名鯷之小者魚出吳中其狀似鮎隋大業中吳郡嘗獻海鮠魚乾膾四缶遂以分賜達官皮日休詩云因逢二老如相問正滯江南為鮠魚徐都官九老會徐祐字受天擢進士第為吏以清白著聲慶歴中屏居於吳日涉園廬以自適時葉公參亦退老于家同為九老會晏元獻杜正獻皆寓詩以髙其趣晏之首題云買得梧宮數畞秋便追黄綺作朋儔杜之卒章云如何九老人猶少應許東歸伴醉吟時與會者纔五人故杜詩及之享年七十有五終都官員外郎子仲謀屢把麾持節女適樞密直學士施昌言中吳紀聞巻二
