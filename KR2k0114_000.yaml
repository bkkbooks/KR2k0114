body:
  text: 中吳紀聞地理類八雜記之屬提要臣等謹案中吳紀聞六卷宋龔明之撰明之字希仲號五休居士崑山人紹興間以鄉貢廷試授髙州文學淳熙初舉經明行修授宣教郎致仕是書採吳中故老嘉言懿行及其風土人文為新舊圖經范成大吳郡志所不載者仿范純仁東齊紀事蘇軾志林之體編次成帙本末該貫足禆風教書成于淳熙九年明之年已九十有二亦可謂耄而好學者矣宋末書己罕𫝊元至正間武寧盧熊修蘇州志訪求而校定之明末常熟毛晉始授諸梓亦多舛謬其子扆後得葉盛菉竹堂藏本相校第六卷多翟超一條其餘頗有異同何焯假以勘定極為精審然盧熊跋稱其子昱所撰行實附後今兩本皆無之則葉本亦不免于脫佚矣今仍據毛晉本繕録焉乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀中吳紀聞序吾家自先殿院占籍中吳距今幾二百祀相𫝊已及雲仍矣明之幼嘗逮事王父每聞講論鄉之先進所以誨化當世者未嘗不注意髙仰云少長從父黨游皆名人魁士及又獲識典刑於親炙之久乃從事於進取虞庠魯泮餘三十年同舍亦多文人行揭德振華咸有可紀厥後世異事變利門名路絶不復往由是聲迹益晦陋瓜疇芋區不過老農相爾汝所與談笑者無復有鴻儒矣竊嘗端居而念焉凡疇昔飫聞而厭見者往往後輩所未喻今年九十有二西山之日已薄恐其說之無𫝊也口授小子昱俾抄其大端藏之篋衍不惟可以稽考往跡資助談柄其間有裨王化關士風者頗多皆新舊圖經及吳地志所不載者至于鬼神夢卜雜置其間蓋效范忠文東齊紀事體談諧嘲謔亦録而弗棄蓋效蘇文忠公志林體皆取其有戒於人耳昱新學小生屬意不倫措辭無法不可以為書豫意為是不滿必得老於文者櫽括之庶幾不為撫掌之資而使後之人誦其所聞以代莊舄之吟爾淳熙九年中和日宣教郎賜緋魚袋致仕龔明之期頤堂書
