body:
  text: 中吳紀聞卷一宋龔明之撰范文正公天聖五年范文正公居母喪上書宰執請擇郡守舉縣令斥游惰去冗僭遴選舉崇教育養將材實邉備保直臣斥佞臣使朝廷無過生靈無怨以杜奸雄凡萬餘言時王文正公曾為相見而偉之服滿薦充館職由此為人主所知不次擢用慶歷三年九月拜參知政事上開天章閣訪以治道公條陳當世急務十條一曰明陟黜二曰抑僥幸三曰精貢舉四曰擇官長五曰均公田六曰厚農桑七曰修武備八曰覃恩信九曰重命令十曰減徭役上嘉納之一嵗之間次第舉行無或遺者公初上宰相書即受知於王文正後陳十事即見聽於仁宗雖曰抱負竒偉不容不見於施設自非聖君賢相委曲信任之亦安能行其所學邪許洞許洞太子洗馬仲容之子洗馬墳在城西登咸平三年進士第平生以文章自負所著詩篇甚多當世皆知其名歐陽文忠公嘗稱其為俊逸之士所居惟植一竹以表特立之操吳人至今稱之曰許洞門前一竿竹真廟祠汾隂時洞為均州參軍在路獻文章令召試中書豫之族妹適洞之曾孫見其家藏洞之敕牒三四紙洞與潘閬錢易為友狂放不羈閬坐盧多遜黨亡命乃變姓名僧服入中條山洞密贈之詩曰潘逍遙平生才氣如天髙倚天大笑無所懼天公嗔汝口呶呶罰教臨老頭補衲歸中條我願中條山山神鎮長在驅雷叱電依前趕出這老怪丁陳范謝錢武肅王鏐之子廣陵王元璙廣陵王之子威顯王文奉皆為中吳軍節度使開府於蘇時有丁陳范謝四人者同在賔幕丁諱守節陳諱贊明范諱夢齡謝諱崇禮職中吳軍節度推官俱以長者稱守節者丞相謂之祖贊明者屯田之竒字虞卿之曾祖夢齡者參政仲淹之曾祖崇禮者太子賔客濤之父其子孫又皆登髙科躋膴仕足見慶源深厚矣辟疆園吳中舊𫝊池館林朩之勝惟辟疆園為第一辟疆姓顧氏晉人見於題咏者甚衆李太白云栁深陶令宅竹暗辟疆園陸羽云辟疆舊林園怪石紛相向陸龜䝉云吳之辟疆園在昔勝槩敵皮日休云更葺園中景應為顧辟疆近世如張伯玉亦云于公門館碎疆園放蕩襟懷水石間今莫知其遺跡所在鬭百草吳王與西施嘗作鬭百草之戲故劉禹錫詩云若共吳王鬭百草不如應是缺西施陳君子陳之竒字虞卿鄉人以其有賢德故以君子稱之初登第為鄱易尉後為丹徒泰興令李瑋尚秦國大長公主下國子監舉通經術有行義者為教授遂以公充選未幾乞致仕遷太子中允時年未五十俄除平江軍節度掌書記復以為教授詔裝錢促遣之力辭不赴公道德著於鄉雖閭巷小兒亦知愛敬有爭訟久不決者跨蹇驢至其家以大義感動之皆為之革心自掛冠後間居十八年熙寧初卒葬花山王岐公為作志題之曰陳君子墓銘始公之謝事也蔣堂侍郎語人曰舉天下皆知有富貴而虞卿獨以知止易衆人之心吾喜林下有人矣因為賦詩曰寵秩拜春坊歸休識慮長掃門卑魏勃設醴謝元王一水蓴鱸國群山橘柚鄉喜君添老社煙駕共徜徉張伯玉郎中亦贈之詩曰東吳王孫歸掛冠玉絲紅鱠滿雕盤狂吟但覺日月久醉舞不知天地寬小圃移花山客瘦夜窗搗藥橘童寒新書近日成多少且告先生旋借看梅聖俞與僧良玉詩崑山慧聚寺良玉字蘊之僧行甚髙旁通文史之學又善書工琴棋因游京師梅聖俞見而喜之以姓名聞于朝賜以紫衣其東歸也聖俞以詩送之曰來衣茶褐袍歸變椹色服扁舟洞庭去落日松江宿水煙晦琴徽山月上巖屋野童遙相迎風葉鳴橡槲後潛遁故山専以講經為務號所居曰雨花堂半夜鐘唐張繼宿楓橋詩云月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船昔人謂鐘聲無半夜者詩話嘗辨之云姑蘇寺鐘多鳴於半夜豫以其說為未盡姑蘇寺鐘唯承天寺至夜半則鳴其它皆五更鐘也此張繼詩王氏學林新編誤以為溫庭筠白樂天白樂天為郡時嘗擕容滿蟬態等十妓夜游西武丘寺嘗賦紀游詩其末云領郡時將久游山數幾何一年十二度非少亦非多可見當時郡政多暇而吏議甚寬使在今日必以罪去矣六經閣記姑蘇自景祐中范文正公典藩方請建學其後富郎中嚴繼之又建六經閣張伯玉公達嘗為郡從事遂命為之記今但𫝊其篇首數句聞見録又誤載其始末豫家偶藏公達所著蓬萊集恐後人不復見全文也因具載之六經閣子史在焉不書尊經也吳郡州學始由髙平范公經緝之其後天章蔣公待制中書桞舍人史館昭文張陸二學士行郡事殿中丞李仲塗先生之猶子中臺栁兵曹今尚書富郎中十年更八政仁賢繼志學始大成六經閣又建先時書籍草創未暇完緝厨之後廡澤地汙晦日滋散脫觀者惻然非古人藏象魏拜六經之意至是富公始與吳邑長洲二大夫以學本之餘錢僦之市材直公堂之南臨泮池建層屋起夏六月乙酉止秋八月甲申凡旬有七浹計庸千有二百作楹十有六楝三架霤八桷三百八十有四二户六牖梯衝楶梲圬墁陶甓稱是祈於久故爽而不庳酌於道故文而不華經南嚮史西嚮子集東嚮標之以油素揭之以油黃澤然區處如蛟龍之鱗麗如日月之在紀不可得而亂大抵天地之極致皇王之髙道生人之紀律盡在是矣古者聖賢之設教也知函夏之至廣生齒之至衆不可以頤解耳授故教之有方導之有源乃本庠序之風師儒之說始於邦達於鄉至於室莫不有學烜之以文物聳之以聲明先用警策其耳目然後清發其靈府故其習之也易其得之也深其教不肅而成不煩而治驅元元入善域優而柔之使自得之萬世之後尊三王四代法者無他焉教化之本末馴善也然則觀是閣者知六經之在則知有聖人之道知有聖人之道則知有朝廷之化知有朝廷之化則嚮方之心日懋一日禮義之澤流于外絃誦之聲格于內其為惡也無所從其為善也有所歸雖不欲徙善逺罪納諸大和不可召康公之詩曰豈弟君子來游來歌子思之說云布在方策人存則政舉凡百君子由斯道治斯民暢皇極序彝倫者捨此而安適得無盡心焉諸儒謂伯玉嘗從事此州游學滋久宜刋樂石庶幾永永無忽唐郎官題名唐郎官題名碑承平時在學舍中堂之後巳漸刓缺兵火後不復存矣序文乃張長史楷書長史以草聖得名未嘗作楷字世尤愛之題名之人雖不一亦盡得古筆法唐世崇尚字學用此以取人凡書皆可觀今所𫝊止序文爾長史蘇人故立碑於此丁晉公祖守節吳越中吳軍節度推官公諱謂字謂之家世於冀其祖仕錢氏遂為吳人公少負才名先叔祖端公在鼎州日公嘗贄文求見因贈之詩曰膽怯何由戴鐵冠祗緣昭代奬孤寒曲肱未遂違前志直指無聞是曠官三署每𫝊朝客說五溪間憑郡樓看祝君早得文場雋況值天階正舞干淳化三年公登進士科名在第四與孫何俱有聲當時王黃州有詩云三百年來文不振直從韓栁到孫丁如今便合教修史二子文章似六經祥符中為參知政事上問唐酒價幾何公曰每斗三百按杜甫詩速宜相就飲一斗恰有三百青銅錢又侍宴賞花釣魚公詩云鶯驚鳯輦穿花去魚畏龍顔上釣遲上賞詠再三群臣皆以為不及天禧中拜相仁宗即位進司徒兼侍中後為章聖山陵使擅移陵域貶將仕郎崖州司户參軍公自遷謫日賦一詩號知命集後因奏表叙策立之功有云雖遷陵之罪大念立主之功多因徙雷州移道州復祕書監光州居住貶竄十五年鬚髮無斑白者人皆服其量臨終半月不食焚香危坐誦佛書以沈香煎湯時呷而巳至光州謝執政啓有云三十年門館從游不無事契一萬里風波往復盡出生成在海上對客問天下州郡孰大客曰唯京師公曰朝廷宰相只作崖州司户則崖州為大衆皆大笑歸葬華山所居在大郎橋號晉公坊堂宇甚古有層閣數間臨其後豫嘗至其第與公之孫德隅游從德隅善篆亦工於四六解額姑蘇自祥符間定制秋舉以四人為額慶歷中就舉者止二百人范貫之龍圖嘗作送錢正叔赴舉序巳言四人之額視他藩為最寡熙寧元豐間應舉者漸多增為六人三舍既行罷去科舉法嵗貢四人舍法罷乃合三年之數為十二人紹興丙子又增流寓一名今終場者幾二千人其額又不勝其窄矣紅蓮稻紅蓮稻從古有之陸魯望别墅懷歸詩云遙為晚花吟白菊近炊香稻識紅蓮至今以此為佳種陸宣公唐書云陸贄蘇州嘉興人按武德中蘇州所管七縣而嘉興本號長水縣後改為由拳又改為嘉禾吳赤烏中方易今名也太一宮太平興國六年方士言五福太一在吳越分太一天之貴神也行度所至之國民受其福故令蘇州建太一宮後以地逺不便於禱祀遂於京城蘇村建之今天慶觀乃其舊址鄉人尚有以宮巷宮前稱者孫百篇吳士孫發嘗舉百篇科故皮日休贈以詩云百篇宮體喧金屋一日官銜下玉除陸龜䝉亦云直應天授與詩情百咏唯消一日成其見推於當時如此此科不知創於何代國初亦無定制惟求應者即命試太平興國五年有趙昌國願試此科帝御殿出四句詩為題詩云松風雪月天花竹鶴雲煙詩酒春池雨山僧道栁泉每題五篇篇四韻至晚僅成數十首方欲激勸後學特賜及第仍詔今後有應此科約此題為式蘇子美蘇舜欽字子美易簡參政之孫慷慨有大志工為古文聲名與歐陽公相上下天聖七年玉清昭應宮災子美以太廟齊郎詣登聞上疏謂天以此垂戒願陛下恭默自省語甚切直時年方二十登景祐元年進士第俄有詔戒越職言事者子美又上書極論其不可慶歷四年授大理評事集賢校理監進奏院當時用事者以子美乃范文正所薦而杜正獻之壻也因鬻故紙㑹客事誣奏之遂除名勒停嘉祐初韓魏公為請於朝追復元官卒年四十一山谷先生嘗有觀祕閣蘇子美題壁詩曲盡其平生大節真蹟藏汪玉山家今集中不載故見之於此仁祖康四海本朝盛文章蘇郎如虎豹孤嘯翰墨場風流映海岱俊鋒不可當學書窺法窟當代見崔張銀鈎刻琬琰蠆尾迥回縑緗擢登群玉府臺閣自生光春風吹細雨禁直夢滄浪人聲市朝逺簾影花竹涼秋河湔筆硯怨句挾風霜不甘老天祿試欲呌未央小臣膽如斗侏儒俸一囊請提師十萬奉辭問邊疆歸鞍飲月支伏背笞中行人事喜乖忤南遷浮夜航此時調玉燭日行中道黃柄臣似牛李傾奪謀未臧薄酒圍邯鄲老龜禍枯桑兼官百郡邸報賽用嵗常招延青雲士共醉椒醑觴俗客避白眼徴歌舞紅裳謗書動宸極牢户繫桁楊一網收冠蓋九衢人走藏庖丁提刀立滿志無四旁論罪等叨餮囚衣禦方良姑蘇麋鹿疃風月有書堂永無湔祓期山鬼共幽篁萬户封侯骨今成狐岡邇來四十年我亦挍書郎雄文終膾炙妙墨見垣牆髙山仰豪氣崢嶸乃不亡張侯開詩卷詞意尚軒昻草書十餘紙雨漏古屋廊誠知千里馬不服萬乘箱遂令駕鼓車此豈用其長事往飛鳥過九原色莽蒼敢告大鈞手才難幸扶將子泌字進之任湖北運使先殿院之女適參政公之子宿宿乃耆之弟於子美為叔父紅梅閣吳感字應之以文章知名天聖二年省試為第一又中天聖九年書判拔萃科仕至殿中丞居小市橋有侍姬曰紅梅因以名其閣嘗作折紅梅詞曰喜輕澌初泮微和漸入芳郊時節春消息夜來陡覺紅梅數枝爭發玉溪仙館不是箇尋常標格化工别與一種風情似勻㸃胭脂染成香雪重吟細閲比繁杏夭桃品流真别只愁共彩雲易散冷落謝池風月慿誰向說三㺯處龍吟休咽大家留取倚闌干問有花堪折勸君須折其詞𫝊播人口春日郡宴必使倡人歌之吳死其閣為林少卿所得兵火前尚存子純字晦叔文行亦髙鄉人呼為吳先生楊元素本事集誤以為蔣堂侍郎有小鬟號紅梅吳殿丞作此詞贈之先髙祖先髙祖諱識給事中諱慎儀之子登端拱三年第大中祥符間用翰林學士李宗諤薦權監察御史屬真宗東封護蹕還都遷殿中侍御史兼左巡使時年四十有二本朝承襲唐制御史不専言職至是始擇學術醇正操履端方可以紀綱朝廷者俾入臺言事得之至難故被選者實為不世之榮先髙祖任職踰年遽抱目疾纍表乞退遂除檢校司封郎官平江軍節度副使先髙祖登第時金花帖子尚存其制用塗金黃紙大書姓名下有兩知舉花押仍用白紙作一大帖貯之亦題姓名於上近吳南英於周參政處模寫王扶盛京二帖子名士題跋甚衆皆以為今世所罕見者豫因歸而視其所藏適與王扶同此一榜規模無毫髮不相似但多白紙為護爾今所謂榜帖者蓋起於此趙霖水利政和六年莊徽待制為郡守中使以金字牌奉御筆云訪聞平江府三十六浦內自古置閘隨潮啓閉泄放水勢嵗久堙塞遂致積年為患今差本府户曹趙霖躬親具逐浦相度經久利害繪圖赴尚書省指說既被㫖因遍歷諸縣遂得其利害霖意不過三說一開治港浦二置閘啓閉三築墟褁田遂條析其事合成一書奏之後略施行霖所建明與郟正夫差異霖専主置閘之說正夫則屬意於開縱浦橫塘使水趨於江而巳竊謂二公之論與今日又不同往時所在多積水故所治之法如此今所以有水旱之患者其弊在於圍田由此水不得停蓄旱不得流注民間遂有無窮之害捨此不治而欲興水利難矣黃氏三夢建寧黃氏乃名族也因游宦遂徙居于吳黃氏有三子皆勤於學問其父夢捷夫持榜帖報黃顔者遂以名其長子巳而果第久之其夢如初乃拆偏旁名仲子以彥彥復掇髙科後數年其夢亦如初黃甚怪之又以頡名其季頡既第顔即死矣崑山編唐人劉綺莊為崑山尉研窮古今緗帙所積甚富嘗分類應用事注釋于下如六帖之狀號崑山編今其書尚存臯橋詩臯橋者漢臯伯通所居之地梁鴻娶孟光同至吳居伯通廡下為人春役後伯通察而異之乃舍之於家皮日休嘗賦詩云臯橋依舊緑楊中閭里猶生隱士風唯我到來居上館不知何道勝梁鴻陸龜䝉詩云橫絶春流架斷虹憑䦨猶想五噫風今來未必非梁孟卻是無人繼伯通謝賔客公諱濤字濟之其先三世仕吳越公幼而竒敏嘗講學于陽山澄照寺之西廡時王翰林禹稱宰長洲羅拾遺處約宰吳縣皆器重之自此顯名於時登淳化三年第知益州華陽縣通判夀州知興國軍真宗即位鋭意任人一日中出朝士姓名有治狀者凡二十四人付中書門下令驛召至闕公在選中命知曹州有凶人趙諫者交權勢結豪俠務乘人之弊以告訐公奏之朝廷斬于都市乃下詔凡民非干已事無得告言遂著于令為兩川安撫還除三司度支判官出守海陵新安二郡俄召試直史館出為兩浙轉運使還判司農寺兼侍御史知雜事知越州任滿拜太常少卿判登聞檢院又得請權西京留司御史臺就拜祕書監遂分司洛下朝廷嘉其恬退遷太子賔客其子既入臺閣迎侍于京師景祐元年卒年七十五贈禮部尚書子絳女適梅堯臣聖俞孫景初景溫公始以文學中進士上第而子孫世踐其科又父子更直館殿出處僅二十餘年皆衣冠之盛事公分務洛下悉屏去外纍於筆硯歌詩素所耽嗜亦不復為曰佚我以老也數年間惟日看舊史一編以代賔話一日因假寐夢中作讀史一絶云百年竒特幾張紙千古英雄一窖塵惟有炳然周孔教至今仁義浹生民越一夕捐館范文正為記其事張子野吳江詩張子野宰吳江日嘗賦詩云春後銀魚霜下鱸逺人曾到合思吳欲圖江色不上筆靜覓鳥聲深在蘆落日未昏聞市散青天都淨見山孤橋南水漲虹垂影清夜澄光合太湖為當時之絶唱春申君姑蘇城隍廟神乃春申君也按史記春申君初相楚後請封於江東考烈王許之因城故吳墟以為都邑吳地志亦云春申君嘗造蛇門以禦越軍其廟食於此也固宜越絶書云吳伐楚封春申君於吳其說又似不同要當以史記之言為正蔣密學蔣堂字希魯嘗兩守此郡後既謝事因家焉自號曰遂翁所居曰靈芝坊作園曰隱圃圃之內如巖扄水月菴煙蘿亭風篁亭香巖峰皆極登臨之勝公喜賔客時為燕㑹日以詩篇為樂范貫之龍圖嘗賦詩云勇退人難事明公識慮長波濤濟舟楫霜雪見松篁林下開前圃花間撤亞槍二疏良宴㑹老杜好篇章道向清來勝機於靜處忘當除印如斗試一較間忙丁晉公拜老郁先生祥符中丁晉公自參知政事拜平江軍節度使知升州時建節鉞者出入必陳其儀度既還鎮鄉人為之改觀公在童齠時嘗從老郁先生學先生居光蕩巷師孟之父户部師淳之伯父豫嘗從師孟學至是首入陋巷詣先生之居以兩朱衣掖之拜于其下先生惶懼大聲呼之曰拜殺老夫矣既坐話舊極款密且云小年狹劣荷先生教誨痛加夏楚使某得成立者皆先生之賜也先生愈不自安不數月果卒公遣吏為辦棺斂葬埋之物甚厚吳人至今以為美談李璋李璋忘其字居盤門內為人不羈王荆公甚愛其才嘗有送行詩云湖海聲名二十年尚隨鄉賦巳華顛卻歸甫里無三徑擬傍胥山就一㕓朱轂風塵休悵望青鞋雲水且留連故人亦見如相問為道方尋朩雁篇又有公下第詩云浩蕩宮門白日開君王髙拱試群才學如吾子何憂失命屬天工不可猜意氣未宜輕感慨文章尤忌數悲哀男兒獨患無名爾將相誰云有種哉由此聲譽益著後以特恩補官孫益字彥中擢髙科歷監察御史徙居常熟公素好譏謔有一故相逺派在吳中嘗於嬉遊之地書其壁曰大丞相再從妷某嘗遊公因題其傍曰混元皇帝三十七代孫李璋繼至嘗赴特奏恩語同試者云廷唱日必不以名見呼止稱某排第耳衆皆不以為然厚與之約巳而進狀云因在京師有逺族相遇譜系亦有以璋名者欲以玖易之它日殿下果唱李玖蓋公排第九也朩蘭堂詩朩蘭堂多為太守燕遊之地范文正公作守時嘗賦詩云堂上列歌鍾多慚不如古却羡朩蘭花曾見霓裳舞白樂天在蘇嘗教倡人為此舞也堂之前後皆植朩蘭幹極髙大兵火後不存林大卿買宅州民有宅一區多出變怪無有售之者林顔大卿獨求買之既徙入中夜據㕔事獨坐以示其不恐忽見一白衣婦人縱其所如俄至一處所潛伏不見詰朝使人穿其地得銀百餘鋌其上皆鐫一林字此無異尉遲敬德事也富祕監富祕監嚴丞相忠文公之叔父也登大中祥符四年第慶歷中以刑部郎中守鄉郡嘉祐中守祕書監致仕退居于家未嘗一造府治終年無毫髮干請士大夫皆賢之皇朝類苑嘗載其事卒贈司徒葬寶華山有子臨娶先都官之女祕監與都官聘書今尚存飽學能文終池陽守鈞洵元衡擢進士第皆祕監公之曾孫也智積菩薩靈巖寺乃智積開山之地智積當東晉末自西土來此創立伽藍泗州僧伽持鉢江南至常之無錫聞智積在蘇即回曰彼處巳有人矣由此名遂顯有一貧嫗慕其行嘗持角黍為獻智積受之嫗因得度至今上巳日號智積誕日聚數百嫗為角黍㑹三江口松江之側有小聚落名三江口酈善長云松江自湖東北徑七十里至江水分流謂之三江口吳越春秋云范蠡去越乘舟出三江之口入五湖中皆謂此也三江即禹貢所指者楊惠之塑天王像慧聚寺有毗沙門天王像形模如生乃唐楊惠之所作惠之初學畫見吳道子藝甚髙遂更為塑工亦能名天下徐稚山侍郎以此像得塑中三昧嘗記其事謂其傍二侍女尤佳且戒後人不可妄加塗飾近為一俗工修治遂失初意王贄運使減租初錢氏國除而田稅尚仍其舊畞稅三斗浙人苦之太宗乃遣王贄為轉運使轉運衙舊在姑蘇州治之西偏均兩浙雜稅贄悉令畞稅一斗使還大臣有責其增減賦額者贄謂畞稅一斗天下之通法兩浙既巳為王民豈可復循僞國之制上從其說浙人至今便之鬭鴨陸魯望有鬭鴨一欄頗極馴養一旦驛使過焉挾彈斃其尤者魯望曰此鴨善人言見欲附蘇州上進使者奈何斃之使者盡以囊中金以窒其口使徐問其語之狀魯望曰能自呼其名爾使者憤且笑拂袖上馬復召之還其金曰吾戲耳中吳紀聞卷一
